<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meyer - High Performance Logic</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #f8fafc; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .bubble-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, rgba(59,130,246,0) 70%); animation: float var(--duration) infinite ease-in-out alternate; }
        @keyframes float { 0% { transform: translateY(0px); } 100% { transform: translateY(-100px); } }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- COMPONENTES AUXILIARES ---
        const Layout = ({ children }) => (
            <div className="relative min-h-screen">
                <div className="bubble-bg">
                    <div className="bubble" style={{ width: '300px', height: '300px', left: '10%', '--duration': '15s' }}></div>
                    <div className="bubble" style={{ width: '200px', height: '200px', left: '60%', '--duration': '12s' }}></div>
                </div>
                <nav className="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center shadow-sm">
                    <div className="font-black text-xl tracking-tighter text-blue-600">THE MEYER</div>
                    <div className="hidden md:flex space-x-8 text-xs font-bold uppercase tracking-widest opacity-60">
                        <a href="#">Hardware</a><a href="#">Software</a><a href="#">About</a>
                    </div>
                </nav>
                <main className="pt-24">{children}</main>
                <footer className="py-12 border-t text-center text-[10px] text-gray-400 tracking-[0.3em] uppercase">
                    &copy; 2026 THE MEYER EU.
                </footer>
            </div>
        );

        const ThinkpadSequence = () => {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const [isReady, setIsReady] = useState(false);
            const [images, setImages] = useState([]);

            // 1. Carga de imágenes (Solo una vez)
            useEffect(() => {
                const frameCount = 38;
                const loadedImages = [];
                let loadedCount = 0;

                for (let i = 0; i < frameCount; i++) {
                    const img = new Image();
                    // Ajusta la extensión si es .png o .png.png según tus archivos reales
                    img.src = `media/animations/frames/loop-thinkpad-animation_${i.toString().padStart(3, '0')}.png`; 
                    img.onload = () => {
                        loadedCount++;
                        if (loadedCount === frameCount) {
                            setImages(loadedImages);
                            setIsReady(true);
                        }
                    };
                    img.onerror = () => {
                        console.error("Error cargando frame:", i);
                        loadedCount++; // Continuar aunque falle una
                        if (loadedCount === frameCount) setIsReady(true);
                    };
                    loadedImages[i] = img;
                }
            }, []);

            // 2. Inicialización de GSAP (Solo cuando las imágenes estén listas)
            useEffect(() => {
                if (!isReady || !canvasRef.current) return;

                gsap.registerPlugin(ScrollTrigger);
                const canvas = canvasRef.current;
                const context = canvas.getContext("2d");
                canvas.width = 1920;
                canvas.height = 1080;

                const thinkpad = { frame: 0 };

                const render = () => {
                    const img = images[thinkpad.frame];
                    if (img) {
                        context.clearRect(0, 0, canvas.width, canvas.height);
                        context.drawImage(img, 0, 0, canvas.width, canvas.height);
                    }
                };

                // Render inicial
                render();

                const tl = gsap.timeline({
                    scrollTrigger: {
                        trigger: containerRef.current,
                        start: "top top",
                        end: "+=300%",
                        scrub: 0.5,
                        pin: true,
                        antialias: true
                    }
                });

                tl.to(thinkpad, {
                    frame: images.length - 1,
                    snap: "frame",
                    ease: "none",
                    onUpdate: render
                });

                return () => {
                    tl.kill();
                    ScrollTrigger.getAll().forEach(t => t.kill());
                };
            }, [isReady, images]);

            return (
                <div ref={containerRef} className="h-screen w-full flex items-center justify-center bg-white overflow-hidden">
                    {!isReady ? (
                        <div className="text-blue-600 font-bold animate-pulse uppercase tracking-widest text-xs">
                            Iniciando Sistemas Meyer...
                        </div>
                    ) : (
                        <canvas ref={canvasRef} className="max-w-full h-auto max-h-[70vh] object-contain" />
                    )}
                </div>
            );
        };

        const App = () => {
            return (
                <Layout>
                    <section className="min-h-[60vh] flex flex-col items-center justify-center px-4 text-center">
                        <h1 className="text-6xl md:text-8xl font-black text-gray-900 tracking-tighter mb-4">
                            MEYER <span className="text-blue-600">CORE</span>
                        </h1>
                        <p className="text-gray-500 max-w-xl text-lg">High-performance logic and hardware integration.</p>
                    </section>
                    
                    <ThinkpadSequence />

                    <section className="h-[50vh] flex items-center justify-center bg-gray-50">
                        <p className="text-xs tracking-[0.5em] text-gray-300 uppercase">End of Transmission</p>
                    </section>
                </Layout>
            );
        };

        // --- RENDER SEGURO ---
        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        } else {
            console.error("No se encontró el elemento #root");
        }
    </script>
</body>
</html>
