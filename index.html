<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meyer - Tech Firm</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #f8fafc; font-family: sans-serif; overflow-x: hidden; width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Background Bubbles */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
        .bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, rgba(59,130,246,0) 70%); animation: float var(--duration) infinite ease-in-out alternate; }
        @keyframes float { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(-100px) scale(1.1); } }
        
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        
        /* Mobile Menu Animations */
        .hidden-menu { opacity: 0; pointer-events: none; transform: translateY(-20px); transition: all 0.3s ease; }

        /* Hardware Section Specifics */
        .hardware-gradient {
            background: radial-gradient(circle at center, white 0%, #f1f5f9 100%);
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const flagMap = {
            'es': '🇪🇸', 'en': '🇺🇸', 'fr': '🇫🇷', 'de': '🇩🇪', 'it': '🇮🇹',
            'pt': '🇧🇷', 'zh-CN': '🇨🇳', 'zh-TW': '🇹🇼', 'ja': '🇯🇵', 'ko': '🇰🇷',
            'ru': '🇷🇺', 'ar': '🇸🇦', 'he': '🇮🇱', 'hi': '🇮🇳', 'nl': '🇳🇱',
            'tr': '🇹🇷', 'pl': '🇵🇱', 'sv': '🇸🇪', 'vi': '🇻🇳', 'th': '🇹🇭'
        };

        const LanguageFlag = () => {
            const [lang, setLang] = useState('es');

            useEffect(() => {
                const htmlNode = document.documentElement;
                const updateLang = () => {
                    const currentLang = htmlNode.getAttribute('lang') || 'es';
                    setLang(currentLang);
                };
                const observer = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        if (mutation.attributeName === 'lang') updateLang();
                    });
                });
                observer.observe(htmlNode, { attributes: true, attributeFilter: ['lang'] });
                updateLang();
                return () => observer.disconnect();
            }, []);

            const baseLang = lang.split('-')[0].toLowerCase();
            const flag = flagMap[lang] || flagMap[baseLang] || '🌐';

            return (
                <div className="flex items-center justify-center opacity-40 hover:opacity-100 transition-all duration-300 cursor-help" title={`Idioma: ${lang.toUpperCase()}`}>
                    <span className="text-[11px] leading-none grayscale-[0.5] hover:grayscale-0 transition-all duration-300">{flag}</span>
                </div>
            );
        };

        const Layout = ({ children }) => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const toggleMenu = () => setIsMobileMenuOpen(!isMobileMenuOpen);

            return (
                <div className="relative min-h-screen w-full overflow-x-hidden">
                    <div className="bubble-bg">
                        <div className="bubble" style={{ width: '300px', height: '300px', left: '10%', '--duration': '15s' }}></div>
                        <div className="bubble" style={{ width: '200px', height: '200px', left: '60%', '--duration': '12s', animationDelay: '2s' }}></div>
                        <div className="bubble" style={{ width: '150px', height: '150px', left: '30%', '--duration': '18s', animationDelay: '5s' }}></div>
                    </div>

                    {/* TOP BAR */}
                    <div className="fixed top-0 w-full h-10 bg-[#0f172a] z-[60] flex items-center justify-between px-4 md:px-8 overflow-hidden">
                        <div className="flex items-center space-x-3">
                            <span className="text-[9px] md:text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] whitespace-nowrap">Inicio</span>
                            <LanguageFlag />
                        </div>
                        <div className="flex items-center space-x-4 md:space-x-8 opacity-60 grayscale hover:grayscale-0 transition-all duration-500 overflow-x-auto no-scrollbar">
                            {['ISO 27001', 'ISO 9001', 'ASSE LEC 2004', 'ETL CERTIFIED', 'PCI DSS'].map((cert, index) => (
                                <div key={index} className="flex items-center space-x-1 flex-shrink-0">
                                    <div className="w-1 h-3 bg-blue-500"></div>
                                    <span className="text-[9px] font-bold text-white tracking-widest uppercase">{cert}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* NAVBAR */}
                    <nav className="fixed left-0 w-full z-50 px-4 md:px-8 py-4 flex justify-between items-center glass shadow-sm transition-all top-[40px]">
                        <a href="/" className="block z-50">
                            <img 
                                src="media/LogoTransparent.png" 
                                alt="The Meyer Logo" 
                                className="h-10 md:h-12 w-auto object-contain"
                                onError={(e) => {
                                    e.target.style.display = 'none';
                                    const fallback = e.target.nextSibling;
                                    if (fallback) fallback.classList.remove('hidden');
                                }}
                            />
                            <span className="hidden font-black text-2xl tracking-tighter text-slate-900">THE MEYER</span>
                        </a>
                        <div className="hidden md:flex space-x-8 text-sm font-semibold tracking-widest uppercase opacity-60">
                            <a href="#" className="hover:text-blue-600 transition-colors">Hardware</a>
                            <a href="#" className="hover:text-blue-600 transition-colors">Software</a>
                            <a href="#" className="hover:text-blue-600 transition-colors">About US</a>
                        </div>
                        <div className="flex items-center space-x-4">
                            <button className="hidden sm:block bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-bold shadow-md hover:bg-blue-700 transition-all active:scale-95">CONTACTO</button>
                            <button onClick={toggleMenu} className="md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 focus:outline-none z-50">
                                <span className="block w-6 h-0.5 bg-gray-900"></span>
                                <span className="block w-6 h-0.5 bg-gray-900"></span>
                                <span className="block w-6 h-0.5 bg-gray-900"></span>
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu Overlay */}
                    <div className={`fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] md:hidden flex flex-col items-center justify-center space-y-8 transition-opacity duration-300 ${isMobileMenuOpen ? 'opacity-100' : 'hidden-menu'}`}>
                        <button onClick={toggleMenu} className="absolute top-6 right-6 p-2 text-gray-900 hover:text-blue-600 transition-colors focus:outline-none">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                        <a href="#" className="text-xl font-bold uppercase" onClick={toggleMenu}>Hardware</a>
                        <a href="#" className="text-xl font-bold uppercase" onClick={toggleMenu}>Software</a>
                        <a href="#" className="text-xl font-bold uppercase" onClick={toggleMenu}>About us</a>
                        <button className="bg-blue-600 text-white px-10 py-4 rounded-full text-lg font-bold shadow-xl mt-4">CONTACTO</button>
                    </div>

                    <main className="pt-32">{children}</main>

                    <footer className="py-12 border-t border-gray-200 text-center text-gray-400 text-sm font-semibold tracking-widest bg-white relative z-20 px-4 w-full">
                        &copy; 2026 THE MEYER EU. TODOS LOS DERECHOS RESERVADOS.
                    </footer>
                </div>
            );
        };

        const HardwareShowcase = () => {
            const containerRef = useRef(null);
            const textRef = useRef(null);
            const imageRef = useRef(null);

            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);

                const tl = gsap.timeline({
                    scrollTrigger: {
                        trigger: containerRef.current,
                        start: "top center",
                        end: "bottom center",
                        scrub: 1,
                    }
                });

                // Entry animation for the motherboard
                tl.fromTo(imageRef.current, 
                    { scale: 0.9, opacity: 0, y: 100 },
                    { scale: 1, opacity: 1, y: 0, duration: 1.5, ease: "power2.out" }
                );

                // Entrance for text content
                tl.fromTo(textRef.current,
                    { opacity: 0, y: 50 },
                    { opacity: 1, y: 0, duration: 1 },
                    "-=0.5"
                );

                return () => {
                    ScrollTrigger.getAll().forEach(t => t.kill());
                };
            }, []);

            return (
                <section ref={containerRef} className="w-full py-20 px-4 md:px-0 flex flex-col items-center justify-center overflow-hidden hardware-gradient">
                    {/* COLUMN 1: WIDEST IMAGE CONTAINER */}
                    <div className="w-full max-w-[1400px] mb-16 px-4 md:px-10">
                        <div className="relative aspect-video md:aspect-[21/9] w-full flex items-center justify-center">
                            <img 
                                ref={imageRef}
                                src="media/animations/motherboard_burst/Product_ingredient_burst_202604030735-ezgif.com-video-to-webp-converter.webp" 
                                alt="Hardware Motherboard Burst Animation"
                                className="w-full h-full object-contain drop-shadow-[0_35px_35px_rgba(0,0,0,0.1)]"
                                onError={(e) => {
                                    e.target.src = "https://placehold.co/1920x1080/0f172a/white?text=Hardware+Burst+Animation";
                                }}
                            />
                        </div>
                    </div>

                    {/* COLUMN 2: REORGANIZED CONTENT BELOW */}
                    <div ref={textRef} className="w-full max-w-4xl px-6 md:px-10 text-center flex flex-col items-center space-y-8">
                        <div className="inline-block px-4 py-1.5 bg-blue-100 text-blue-700 text-[10px] md:text-xs font-black rounded-full tracking-[0.3em] uppercase">
                            Exclusive Hardware Engineering
                        </div>
                        
                        <h2 className="text-4xl md:text-7xl font-black text-gray-900 tracking-tighter leading-[0.9] md:leading-[1.1]">
                            Potencia Bruta. <br/><span className="text-blue-600">Control Absoluto.</span>
                        </h2>

                        <p className="text-gray-500 text-lg md:text-2xl font-medium max-w-2xl leading-relaxed">
                            Diseñamos la base de su infraestructura digital con componentes de grado industrial, optimizados para seguridad Zero Trust y flujos de datos ininterrumpidos.
                        </p>

                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 md:gap-12 w-full pt-8 border-t border-gray-100">
                            <div className="flex flex-col items-center space-y-2 group">
                                <span className="text-3xl md:text-5xl font-black text-slate-800 group-hover:text-blue-600 transition-colors">Z790</span>
                                <div className="h-1 w-8 bg-blue-500 rounded-full"></div>
                                <p className="text-[11px] text-gray-400 font-bold uppercase tracking-widest">Next-Gen Chipset</p>
                            </div>
                            <div className="flex flex-col items-center space-y-2 group">
                                <span className="text-3xl md:text-5xl font-black text-slate-800 group-hover:text-blue-600 transition-colors">PCIe 5.0</span>
                                <div className="h-1 w-8 bg-blue-500 rounded-full"></div>
                                <p className="text-[11px] text-gray-400 font-bold uppercase tracking-widest">Bandwidth interface</p>
                            </div>
                            <div className="flex flex-col items-center space-y-2 group">
                                <span className="text-3xl md:text-5xl font-black text-slate-800 group-hover:text-blue-600 transition-colors">DDR5</span>
                                <div className="h-1 w-8 bg-blue-500 rounded-full"></div>
                                <p className="text-[11px] text-gray-400 font-bold uppercase tracking-widest">ECC Memory Tech</p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const App = () => {
            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);
                gsap.from("#hero-content", { duration: 1.5, y: 50, opacity: 0, ease: "power4.out" });
            }, []);

            return (
                <Layout>
                    {/* HERO SECTION */}
                    <section className="min-h-[60vh] md:min-h-[80vh] flex flex-col items-center justify-center px-4 pt-12 md:pt-20 text-center relative overflow-hidden">
                        <div id="hero-content" className="relative z-10">
                            <div className="inline-block mb-6 px-4 py-1 border border-blue-200 text-blue-600 text-[10px] font-bold rounded-full tracking-[0.4em] uppercase bg-blue-50/50 backdrop-blur-sm">
                                EST. 2026 | TECH FIRM
                            </div>
                            <h1 className="text-5xl md:text-[10rem] font-black text-gray-900 tracking-tighter mb-8 leading-[0.8] md:leading-[0.85]">
                                LA NUEVA <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-800">ERA DIGITAL</span>
                            </h1>
                            <p className="text-lg md:text-2xl text-gray-500 max-w-3xl mx-auto mb-12 font-medium">
                                Redefiniendo la infraestructura crítica con soluciones de hardware y software blindadas por los estándares más altos de seguridad.
                            </p>
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
                                <button className="w-full sm:w-auto px-10 py-5 bg-blue-600 text-white font-black rounded-full hover:bg-blue-700 hover:scale-105 transition-all shadow-xl shadow-blue-200 uppercase tracking-widest text-sm">Explorar Hardware</button>
                                <button className="w-full sm:w-auto px-10 py-5 bg-white text-slate-900 border border-slate-200 font-black rounded-full hover:bg-slate-50 transition-all uppercase tracking-widest text-sm">Casos de Éxito</button>
                            </div>
                        </div>
                        
                        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce opacity-30">
                            <svg className="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 14l-7 7-7-7" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5"/></svg>
                        </div>
                    </section>

                    {/* HARDWARE SHOWCASE (STACKED LAYOUT) */}
                    <HardwareShowcase />

                    {/* CERTIFICATIONS / STANDARDS */}
                    <section className="py-32 bg-slate-900 px-4 relative z-20 overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                            <div className="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-blue-500 to-transparent"></div>
                        </div>
                        
                        <div className="max-w-6xl mx-auto">
                            <div className="text-center mb-20">
                                <h3 className="text-3xl md:text-5xl font-black text-white tracking-tighter mb-4">Certificaciones Internacionales</h3>
                                <p className="text-slate-400 text-lg font-medium">Cumplimos con los protocolos más rigurosos de la industria tecnológica.</p>
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
                                {[
                                    { id: 'ISO 27001', label: 'Seguridad Info.', icon: '🛡️' },
                                    { id: 'ISO 9001', label: 'Gestión Calidad', icon: '💎' },
                                    { id: 'ASSE LEC', label: 'Infraestructura', icon: '⚙️' },
                                    { id: 'PCI DSS', label: 'Financiero', icon: '💳' }
                                ].map((cert, idx) => (
                                    <div key={idx} className="p-8 bg-slate-800/50 backdrop-blur border border-slate-700 rounded-3xl flex flex-col items-center group hover:bg-blue-600 transition-all duration-500 cursor-default">
                                        <span className="text-4xl mb-4 group-hover:scale-125 transition-transform duration-500">{cert.icon}</span>
                                        <p className="font-black text-white text-lg tracking-tight mb-1">{cert.id}</p>
                                        <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest group-hover:text-blue-100">{cert.label}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
