<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meyer - Sistemas Integrados</title>

    <!-- UI Core -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #f8fafc; font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Background Bubbles */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
        .bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, rgba(59,130,246,0) 70%); animation: float var(--duration) infinite ease-in-out alternate; }
        @keyframes float { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(-100px) scale(1.1); } }
        
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        
        /* Mobile Menu Animations */
        .menu-open #line1 { transform: translateY(8px) rotate(45deg); }
        .menu-open #line2 { opacity: 0; }
        .menu-open #line3 { transform: translateY(-8px) rotate(-45deg); }
        .hidden-menu { opacity: 0; pointer-events: none; transform: translateY(-20px); transition: all 0.3s ease; }
    </style>

    <!-- React Framework CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Animation Engines -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- LAYOUT COMPONENT ---
        const Layout = ({ children }) => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const toggleMenu = () => setIsMobileMenuOpen(!isMobileMenuOpen);

            return (
                <div className="relative min-h-screen">
                    {/* Background Bubbles */}
                    <div className="bubble-bg">
                        <div className="bubble" style={{ width: '300px', height: '300px', left: '10%', '--duration': '15s' }}></div>
                        <div className="bubble" style={{ width: '200px', height: '200px', left: '60%', '--duration': '12s', animationDelay: '2s' }}></div>
                        <div className="bubble" style={{ width: '150px', height: '150px', left: '30%', '--duration': '18s', animationDelay: '5s' }}></div>
                    </div>

                    {/* Top Banner */}
                    <div className="fixed top-0 w-full h-10 bg-[#0f172a] z-[60] flex items-center justify-between px-4 md:px-8 overflow-hidden">
                        <span className="text-[9px] md:text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] whitespace-nowrap">
                            SUSTENTABILIDAD CORPORATIVA & ESG
                        </span>
                        <div className="flex items-center space-x-4 md:space-x-8 opacity-60 grayscale hover:grayscale-0 transition-all duration-500 overflow-x-auto no-scrollbar">
                            {['ISO 27001', 'ISO 9001', 'ASSE LEC 2004', 'ETL CERTIFIED', 'PCI DSS'].map((cert, index) => (
                                <div key={index} className="flex items-center space-x-1 flex-shrink-0">
                                    <div className="w-1 h-3 bg-blue-500"></div>
                                    <span className="text-[9px] font-bold text-white tracking-widest uppercase">{cert}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Navigation */}
                    <nav className="fixed left-0 w-full z-50 px-6 md:px-8 py-4 flex justify-between items-center glass shadow-sm transition-all top-[40px]">
                        <a href="#" className="block z-50 font-black text-2xl tracking-tighter">
                            THE MEYER
                        </a>
                        
                        <div className="hidden md:flex space-x-8 text-sm font-semibold tracking-widest uppercase opacity-60">
                            <a href="#" className="hover:text-blue-600 transition-colors">Tecnologias</a>
                            <a href="#" className="hover:text-blue-600 transition-colors">Sustentabilidad</a>
                            <a href="#" className="hover:text-blue-600 transition-colors">Nosotros</a>
                        </div>

                        <div className="flex items-center space-x-4">
                            <button className="hidden sm:block bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full text-sm font-bold transition-all transform hover:scale-105 shadow-md">
                                CONTACTO
                            </button>
                            
                            <button onClick={toggleMenu} className={`md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 focus:outline-none z-[110] ${isMobileMenuOpen ? 'menu-open' : ''}`}>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-transform duration-300" id="line1"></span>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-opacity duration-300" id="line2"></span>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-transform duration-300" id="line3"></span>
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu */}
                    <div id="mobile-menu" className={`fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] md:hidden flex flex-col items-center justify-center space-y-8 transition-opacity duration-300 ${isMobileMenuOpen ? 'opacity-100' : 'hidden-menu'}`}>
                        <div className="flex flex-col items-center space-y-8 text-xl font-bold tracking-[0.2em] uppercase text-gray-900">
                            <a href="#" className="hover:text-blue-600 transition-colors" onClick={toggleMenu}>Tecnologias</a>
                            <a href="#" className="hover:text-blue-600 transition-colors" onClick={toggleMenu}>Sustentabilidad</a>
                            <a href="#" className="hover:text-blue-600 transition-colors" onClick={toggleMenu}>Nosotros</a>
                        </div>
                        <button onClick={toggleMenu} className="bg-blue-600 text-white px-10 py-4 rounded-full text-lg font-bold shadow-xl">
                            CONTACTO
                        </button>
                    </div>

                    <main className="pt-32">
                        {children}
                    </main>

                    <footer className="py-12 border-t border-gray-200 text-center text-gray-400 text-sm font-semibold tracking-widest bg-white relative z-20 px-4">
                        &copy; 2026 THE MEYER EU. TODOS LOS DERECHOS RESERVADOS.
                    </footer>
                </div>
            );
        };

        // --- CANVAS ANIMATION COMPONENT ---
        const ThinkpadSequence = () => {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);

            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);
                
                const canvas = canvasRef.current;
                const context = canvas.getContext("2d");
                
                // Set canvas size
                canvas.width = 1152;
                canvas.height = 648;

                const frameCount = 37;
                // EDIT THIS LINE: This is how you would reference your actual folder path.
                // e.g. padding to 0001.webp format
                const currentFrame = index => (
                    `/media/animations/frames/thinkpad/${(index + 1).toString().padStart(4, '0')}.webp`
                );

                const images = [];
                const thinkpad = { frame: 0 };

                // 1. Preload images
                for (let i = 0; i < frameCount; i++) {
                    const img = new Image();
                    // Fallback to avoid broken images in preview if path doesn't exist
                    img.onerror = () => { img.isPlaceholder = true; }; 
                    img.src = currentFrame(i);
                    images.push(img);
                }

                // Render function
                const render = () => {
                    context.clearRect(0, 0, canvas.width, canvas.height);
                    const img = images[thinkpad.frame];

                    if (img && img.complete && !img.isPlaceholder) {
                        // Draw actual loaded image
                        context.drawImage(img, 0, 0, canvas.width, canvas.height);
                    } else {
                        // Mock render for preview environment showing the current frame
                        context.fillStyle = "#e2e8f0";
                        context.fillRect(0, 0, canvas.width, canvas.height);
                        context.fillStyle = "#1e293b";
                        context.font = "bold 48px sans-serif";
                        context.textAlign = "center";
                        context.fillText(`Mock Frame: ${thinkpad.frame + 1} / ${frameCount}`, canvas.width / 2, canvas.height / 2);
                        context.font = "24px sans-serif";
                        context.fillStyle = "#64748b";
                        context.fillText(`Path: ${currentFrame(thinkpad.frame)}`, canvas.width / 2, canvas.height / 2 + 50);
                    }
                };

                // Draw first frame on load
                images[0].onload = render;
                // Force initial render for placeholders
                render();

                // 2. Setup GSAP ScrollTrigger
                let tl = gsap.timeline({
                    scrollTrigger: {
                        trigger: containerRef.current,
                        start: "top top",
                        end: "+=300%", // Pins for a scroll distance equal to 3x screen height
                        scrub: 0.5, // Smooth scrubbing
                        pin: true,  // Pins the container in place while animating
                    }
                });

                tl.to(thinkpad, {
                    frame: frameCount - 1,
                    snap: "frame",
                    ease: "none",
                    onUpdate: render
                });

                // Cleanup on unmount
                return () => {
                    ScrollTrigger.getAll().forEach(t => t.kill());
                };
            }, []);

            return (
                <div ref={containerRef} className="h-screen w-full flex flex-col items-center justify-center bg-gray-50 overflow-hidden relative">
                    <div className="absolute top-10 text-center z-10 w-full px-4">
                        <h2 className="text-4xl md:text-5xl font-bold text-gray-900 mb-4 tracking-tight">Potencia sin límites.</h2>
                        <p className="text-gray-500 text-lg">Haz scroll para descubrir cada detalle.</p>
                    </div>
                    
                    <canvas 
                        ref={canvasRef} 
                        className="max-w-full h-auto max-h-[80vh] object-contain shadow-2xl rounded-2xl"
                    />
                </div>
            );
        };

        // --- APP COMPONENT ---
        const App = () => {
            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);

                gsap.from("#hero-title", { duration: 1.5, y: 50, opacity: 0, ease: "power4.out" });
                gsap.from("#hero-subtitle", { duration: 1.5, y: 30, opacity: 0, delay: 0.3, ease: "power4.out" });
            }, []);

            return (
                <Layout>
                    {/* Dummy Hero Section to provide initial scroll space */}
                    <div className="min-h-[80vh] flex flex-col items-center justify-center px-4 text-center">
                        <h1 id="hero-title" className="text-5xl md:text-7xl font-black text-gray-900 tracking-tighter mb-6">
                            Innovación Integrada
                        </h1>
                        <p id="hero-subtitle" className="text-xl md:text-2xl text-gray-600 max-w-2xl">
                            Soluciones tecnológicas de vanguardia con un fuerte compromiso hacia la sustentabilidad ESG.
                        </p>
                    </div>

                    {/* Canvas Scroll Sequence Component */}
                    <ThinkpadSequence />

                    {/* Extra Section to scroll past the canvas */}
                    <div className="min-h-[60vh] flex items-center justify-center bg-white px-4">
                        <div className="max-w-3xl text-center">
                            <h3 className="text-3xl font-bold mb-6">Certificaciones de Calidad</h3>
                            <p className="text-gray-600 leading-relaxed">
                                Nuestro compromiso se refleja en nuestras operaciones. Continuamos scrollando más allá del modelo 3D renderizado para descubrir cómo nuestras integraciones mejoran los ecosistemas empresariales.
                            </p>
                        </div>
                    </div>
                </Layout>
            );
        };


                    <footer className="py-12 border-t border-gray-100 text-center text-gray-400 text-sm font-semibold tracking-widest bg-white relative z-20 px-4">
                        &copy; 2025 THE MEYER EU. TODOS LOS DERECHOS RESERVADOS.
                    </footer>
                </Layout>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
