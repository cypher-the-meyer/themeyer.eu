<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meyer - Sistemas Integrados</title>

    <!-- UI Core -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #f8fafc; font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Background Bubbles */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
        .bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, rgba(59,130,246,0) 70%); animation: float var(--duration) infinite ease-in-out alternate; }
        @keyframes float { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(-100px) scale(1.1); } }
        
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        
        /* Mobile Menu Animations */
        .menu-open #line1 { transform: translateY(8px) rotate(45deg); }
        .menu-open #line2 { opacity: 0; }
        .menu-open #line3 { transform: translateY(-8px) rotate(-45deg); }
        .hidden-menu { opacity: 0; pointer-events: none; transform: translateY(-20px); transition: all 0.3s ease; }
    </style>

    <!-- React Framework CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Animation Engines -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- LAYOUT COMPONENT ---
        const Layout = ({ children }) => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const toggleMenu = () => setIsMobileMenuOpen(!isMobileMenuOpen);

            return (
                <div className="relative min-h-screen">
                    <div className="bubble-bg">
                        <div className="bubble" style={{ width: '300px', height: '300px', left: '10%', '--duration': '15s' }}></div>
                        <div className="bubble" style={{ width: '200px', height: '200px', left: '60%', '--duration': '12s', animationDelay: '2s' }}></div>
                        <div className="bubble" style={{ width: '150px', height: '150px', left: '30%', '--duration': '18s', animationDelay: '5s' }}></div>
                    </div>

                    <div className="fixed top-0 w-full h-10 bg-[#0f172a] z-[60] flex items-center justify-between px-4 md:px-8 overflow-hidden">
                        <span className="text-[9px] md:text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] whitespace-nowrap">
                            SUSTENTABILIDAD CORPORATIVA & ESG
                        </span>
                        <div className="flex items-center space-x-4 md:space-x-8 opacity-60 grayscale hover:grayscale-0 transition-all duration-500 overflow-x-auto no-scrollbar">
                            {['ISO 27001', 'ISO 9001', 'ASSE LEC 2004', 'ETL CERTIFIED', 'PCI DSS'].map((cert, index) => (
                                <div key={index} className="flex items-center space-x-1 flex-shrink-0">
                                    <div className="w-1 h-3 bg-blue-500"></div>
                                    <span className="text-[9px] font-bold text-white tracking-widest uppercase">{cert}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <nav className="fixed left-0 w-full z-50 px-6 md:px-8 py-4 flex justify-between items-center glass shadow-sm transition-all top-[40px]">
                        <a href="/" className="block z-50">
                            <img 
                                src="main/media/logos" 
                                alt="The Meyer Logo" 
                                className="h-10 md:h-12 w-auto object-contain"
                                onError={(e) => {
                                    e.target.style.display = 'none';
                                    e.target.nextSibling.style.display = 'block';
                                }}
                            />
                            <span className="hidden font-black text-2xl tracking-tighter">THE MEYER</span>
                        </a>
                        <div className="hidden md:flex space-x-8 text-sm font-semibold tracking-widest uppercase opacity-60">
                            <a href="#" className="hover:text-blue-600">Tecnologias</a>
                            <a href="#" className="hover:text-blue-600">Sustentabilidad</a>
                            <a href="#" className="hover:text-blue-600">Nosotros</a>
                        </div>
                        <div className="flex items-center space-x-4">
                            <button className="hidden sm:block bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-bold shadow-md">CONTACTO</button>
                            <button onClick={toggleMenu} className={`md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 focus:outline-none z-[110] ${isMobileMenuOpen ? 'menu-open' : ''}`}>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-transform duration-300" id="line1"></span>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-opacity duration-300" id="line2"></span>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-transform duration-300" id="line3"></span>
                            </button>
                        </div>
                    </nav>

                    <div className={`fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] md:hidden flex flex-col items-center justify-center space-y-8 transition-opacity duration-300 ${isMobileMenuOpen ? 'opacity-100' : 'hidden-menu'}`}>
                        <a href="#" className="text-xl font-bold uppercase" onClick={toggleMenu}>Tecnologias</a>
                        <a href="#" className="text-xl font-bold uppercase" onClick={toggleMenu}>Sustentabilidad</a>
                        <a href="#" className="text-xl font-bold uppercase" onClick={toggleMenu}>Nosotros</a>
                        <button onClick={toggleMenu} className="bg-blue-600 text-white px-10 py-4 rounded-full text-lg font-bold">CONTACTO</button>
                    </div>

                    <main className="pt-32">{children}</main>

                    <footer className="py-12 border-t border-gray-200 text-center text-gray-400 text-sm font-semibold tracking-widest bg-white relative z-20 px-4">
                        &copy; 2026 THE MEYER EU. TODOS LOS DERECHOS RESERVADOS.
                    </footer>
                </div>
            );
        };

        const ThinkpadSequence = () => {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);

            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);
                const canvas = canvasRef.current;
                const context = canvas.getContext("2d");
                
                canvas.width = 1920; 
                canvas.height = 1080;

                const frameCount = 38;
                // Updated to point to loop-thinkpad-animation_XXX.png.png in media/animations/frames/
                const currentFrame = index => (
                    `media/animations/frames/loop-thinkpad-animation_${index.toString().padStart(3, '0')}.png.png`
                );

                const images = [];
                const thinkpad = { frame: 0 };

                for (let i = 0; i < frameCount; i++) {
                    const img = new Image();
                    img.onerror = () => { img.isPlaceholder = true; }; 
                    img.src = currentFrame(i);
                    images.push(img);
                }

                const render = () => {
                    context.clearRect(0, 0, canvas.width, canvas.height);
                    const img = images[thinkpad.frame];
                    if (img && img.complete && !img.isPlaceholder) {
                        context.drawImage(img, 0, 0, canvas.width, canvas.height);
                    } else {
                        context.fillStyle = "#1e293b";
                        context.font = "bold 32px sans-serif";
                        context.textAlign = "center";
                        context.fillText(`Frame: ${thinkpad.frame.toString().padStart(3, '0')}.png.png`, canvas.width / 2, canvas.height / 2);
                    }
                };

                if (images[0]) images[0].onload = render;
                render();

                gsap.to(thinkpad, {
                    frame: frameCount - 1,
                    snap: "frame",
                    ease: "none",
                    scrollTrigger: {
                        trigger: containerRef.current,
                        start: "top top",
                        end: "+=300%",
                        scrub: 0.5,
                        pin: true,
                    },
                    onUpdate: render
                });

                return () => ScrollTrigger.getAll().forEach(t => t.kill());
            }, []);

            return (
                <div ref={containerRef} className="h-screen w-full flex flex-col items-center justify-center overflow-hidden relative">
                    <div className="absolute top-10 text-center z-10 w-full px-4">
                        <h2 className="text-4xl md:text-5xl font-bold text-gray-900 mb-2 tracking-tight">Potencia sin límites.</h2>
                        <p className="text-gray-500 text-lg">Explora la ingeniería de precisión.</p>
                    </div>
                    <canvas 
                        ref={canvasRef} 
                        className="max-w-full h-auto max-h-[64vh] object-contain" 
                    />
                </div>
            );
        };

        const App = () => {
            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);
                gsap.from("#hero-title", { duration: 1.2, y: 30, opacity: 0, ease: "power3.out" });
            }, []);

            return (
                <Layout>
                    <div className="min-h-[70vh] flex flex-col items-center justify-center px-4 text-center">
                        <h1 id="hero-title" className="text-5xl md:text-7xl font-black text-gray-900 tracking-tighter mb-6">
                            Innovación Integrada
                        </h1>
                        <p className="text-xl text-gray-600 max-w-2xl">
                            Soluciones tecnológicas de vanguardia con un fuerte compromiso hacia la sustentabilidad ESG.
                        </p>
                    </div>
                    <ThinkpadSequence />
                    <div className="min-h-[50vh] flex items-center justify-center bg-white px-4">
                        <div className="max-w-xl text-center">
                            <h3 className="text-2xl font-bold mb-4">Certificaciones de Calidad</h3>
                            <p className="text-gray-500">Nuestro compromiso se refleja en nuestras operaciones globales y estándares de excelencia.</p>
                        </div>
                    </div>
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
