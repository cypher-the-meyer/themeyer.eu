<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meyer - Tech Firm</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #f8fafc; font-family: sans-serif; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Background Bubbles */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
        .bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, rgba(59,130,246,0) 70%); animation: float var(--duration) infinite ease-in-out alternate; }
        @keyframes float { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(-100px) scale(1.1); } }
        
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        
        /* Mobile Menu Animations */
        .hidden-menu { opacity: 0; pointer-events: none; transform: translateY(-20px); transition: all 0.3s ease; }

        .sticky-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const flagMap = {
            'es': '🇪🇸', 'en': '🇺🇸', 'fr': '🇫🇷', 'de': '🇩🇪', 'it': '🇮🇹',
            'pt': '🇧🇷', 'zh-CN': '🇨🇳', 'zh-TW': '🇹🇼', 'ja': '🇯🇵', 'ko': '🇰🇷',
            'ru': '🇷🇺', 'ar': '🇸🇦', 'he': '🇮🇱', 'hi': '🇮🇳', 'nl': '🇳🇱',
            'tr': '🇹🇷', 'pl': '🇵🇱', 'sv': '🇸🇪', 'vi': '🇻🇳', 'th': '🇹🇭'
        };

        const LanguageFlag = () => {
            const [lang, setLang] = useState('es');

            useEffect(() => {
                const htmlNode = document.documentElement;
                const updateLang = () => {
                    const currentLang = htmlNode.getAttribute('lang') || 'es';
                    setLang(currentLang);
                };
                const observer = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        if (mutation.attributeName === 'lang') updateLang();
                    });
                });
                observer.observe(htmlNode, { attributes: true, attributeFilter: ['lang'] });
                updateLang();
                return () => observer.disconnect();
            }, []);

            const baseLang = lang.split('-')[0].toLowerCase();
            const flag = flagMap[lang] || flagMap[baseLang] || '🌐';

            return (
                <div className="flex items-center justify-center opacity-40 hover:opacity-100 transition-all duration-300 cursor-help" title={`Idioma: ${lang.toUpperCase()}`}>
                    <span className="text-[11px] leading-none grayscale-[0.5] hover:grayscale-0 transition-all duration-300">{flag}</span>
                </div>
            );
        };

        const Layout = ({ children }) => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const toggleMenu = () => setIsMobileMenuOpen(!isMobileMenuOpen);

            return (
                <div className="relative min-h-screen">
                    <div className="bubble-bg">
                        <div className="bubble" style={{ width: '300px', height: '300px', left: '10%', '--duration': '15s' }}></div>
                        <div className="bubble" style={{ width: '200px', height: '200px', left: '60%', '--duration': '12s', animationDelay: '2s' }}></div>
                        <div className="bubble" style={{ width: '150px', height: '150px', left: '30%', '--duration': '18s', animationDelay: '5s' }}></div>
                    </div>

                    <div className="fixed top-0 w-full h-10 bg-[#0f172a] z-[60] flex items-center justify-between px-4 md:px-8 overflow-hidden">
                        <div className="flex items-center space-x-3">
                            <span className="text-[9px] md:text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] whitespace-nowrap">NOSOTROS</span>
                            <LanguageFlag />
                        </div>
                        <div className="flex items-center space-x-4 md:space-x-8 opacity-60 grayscale hover:grayscale-0 transition-all duration-500 overflow-x-auto no-scrollbar">
                            {['ISO 27001', 'ISO 9001', 'ASSE LEC 2004', 'ETL CERTIFIED', 'PCI DSS'].map((cert, index) => (
                                <div key={index} className="flex items-center space-x-1 flex-shrink-0">
                                    <div className="w-1 h-3 bg-blue-500"></div>
                                    <span className="text-[9px] font-bold text-white tracking-widest uppercase">{cert}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <nav className="fixed left-0 w-full z-50 px-6 md:px-8 py-4 flex justify-between items-center glass shadow-sm transition-all top-[40px]">
                        <a href="/" className="block z-50">
                            <img 
                                src="media/LogoTransparent.png" 
                                alt="The Meyer Logo" 
                                className="h-10 md:h-12 w-auto object-contain"
                                onError={(e) => {
                                    e.target.style.display = 'none';
                                    const fallback = e.target.nextSibling;
                                    if (fallback) fallback.classList.remove('hidden');
                                }}
                            />
                            <span className="hidden font-black text-2xl tracking-tighter text-slate-900">THE MEYER</span>
                        </a>
                        <div className="hidden md:flex space-x-8 text-sm font-semibold tracking-widest uppercase opacity-60">
                            <a href="#" className="hover:text-blue-600 transition-colors">Hardware</a>
                            <a href="#" className="hover:text-blue-600 transition-colors">Software</a>
                            <a href="#" className="hover:text-blue-600 transition-colors">About US</a>
                        </div>
                        <div className="flex items-center space-x-4">
                            <button className="hidden sm:block bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-bold shadow-md hover:bg-blue-700 transition-all active:scale-95">CONTACTO</button>
                            <button onClick={toggleMenu} className="md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 focus:outline-none z-50">
                                <span className="block w-6 h-0.5 bg-gray-900"></span>
                                <span className="block w-6 h-0.5 bg-gray-900"></span>
                                <span className="block w-6 h-0.5 bg-gray-900"></span>
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu Overlay */}
                    <div className={`fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] md:hidden flex flex-col items-center justify-center space-y-8 transition-opacity duration-300 ${isMobileMenuOpen ? 'opacity-100' : 'hidden-menu'}`}>
                        <button onClick={toggleMenu} className="absolute top-6 right-6 p-2 text-gray-900 hover:text-blue-600 transition-colors focus:outline-none">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                        <a href="#" className="text-xl font-bold uppercase" onClick={toggleMenu}>Hardware</a>
                        <a href="#" className="text-xl font-bold uppercase" onClick={toggleMenu}>Software</a>
                        <a href="#" className="text-xl font-bold uppercase" onClick={toggleMenu}>About us</a>
                        <button className="bg-blue-600 text-white px-10 py-4 rounded-full text-lg font-bold shadow-xl mt-4">CONTACTO</button>
                    </div>

                    <main className="pt-32">{children}</main>

                    <footer className="py-12 border-t border-gray-200 text-center text-gray-400 text-sm font-semibold tracking-widest bg-white relative z-20 px-4">
                        &copy; 2026 THE MEYER EU. TODOS LOS DERECHOS RESERVADOS.
                    </footer>
                </div>
            );
        };

        const HardwareShowcase = () => {
            const containerRef = useRef(null);
            const textRef = useRef(null);
            const imageRef = useRef(null);

            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);

                const tl = gsap.timeline({
                    scrollTrigger: {
                        trigger: containerRef.current,
                        start: "top top",
                        end: "+=150%",
                        scrub: 1,
                        pin: true,
                        anticipatePin: 1
                    }
                });

                tl.fromTo(imageRef.current, 
                    { scale: 0.8, opacity: 0, rotateY: -20 },
                    { scale: 1, opacity: 1, rotateY: 0, duration: 1 }
                );

                tl.fromTo(textRef.current,
                    { opacity: 0, x: 50 },
                    { opacity: 1, x: 0, duration: 0.5 },
                    "-=0.5"
                );

                return () => {
                    ScrollTrigger.getAll().forEach(t => t.kill());
                };
            }, []);

            return (
                <div ref={containerRef} className="h-screen w-full flex flex-col md:flex-row items-center justify-center md:justify-between px-6 md:px-20 overflow-hidden relative gap-8">
                    <div className="w-full md:w-1/2 flex justify-center md:justify-start">
                        <img 
                            ref={imageRef}
                            src="media/animations/Product_ingredient_burst_202604030735.webp" 
                            alt="Hardware Component Animation"
                            className="max-w-full h-auto max-h-[50vh] md:max-h-[70vh] object-contain drop-shadow-2xl"
                            style={{ perspective: '1000px' }}
                            onError={(e) => {
                                // Fallback if local file isn't found
                                e.target.src = "https://placehold.co/800x600/0f172a/white?text=Hardware+Animation";
                            }}
                        />
                    </div>

                    <div ref={textRef} className="w-full md:w-1/2 flex flex-col justify-center text-center md:text-right space-y-6">
                        <div className="inline-block md:ml-auto mb-2 px-3 py-1 bg-blue-100 text-blue-600 text-xs font-bold rounded-full tracking-widest">
                            ENGINEERING EXCELLENCE
                        </div>
                        <h2 className="text-4xl md:text-6xl font-bold text-gray-900 tracking-tight leading-tight">
                            Arquitectura de <br/><span className="text-blue-600">Nueva Generación.</span>
                        </h2>
                        <p className="text-gray-500 text-lg md:text-xl max-w-lg mx-auto md:ml-auto md:mr-0">
                            Implementamos el hardware más avanzado para garantizar estabilidad crítica en entornos de Zero Trust y procesamiento masivo.
                        </p>
                        <div className="flex flex-wrap justify-center md:justify-end gap-4 pt-4">
                            <div className="text-center px-4 border-r border-gray-200 last:border-0">
                                <p className="text-2xl font-bold text-slate-800">Z790</p>
                                <p className="text-[10px] text-gray-400 uppercase">Chipset</p>
                            </div>
                            <div className="text-center px-4 border-r border-gray-200 last:border-0">
                                <p className="text-2xl font-bold text-slate-800">PCIe 5.0</p>
                                <p className="text-[10px] text-gray-400 uppercase">Interface</p>
                            </div>
                            <div className="text-center px-4">
                                <p className="text-2xl font-bold text-slate-800">DDR5</p>
                                <p className="text-[10px] text-gray-400 uppercase">Memory</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);
                gsap.from("#hero-content", { duration: 1.5, y: 50, opacity: 0, ease: "power4.out" });
            }, []);

            return (
                <Layout>
                    <section className="min-h-[70vh] flex flex-col items-center justify-center px-4 text-center">
                        <div id="hero-content">
                            <h1 className="text-5xl md:text-8xl font-black text-gray-900 tracking-tighter mb-6 leading-none">
                                Innovación en <br/>Infraestructura.
                            </h1>
                            <p className="text-xl text-gray-500 max-w-2xl mx-auto mb-10">
                                Desarrollo, distribución y mantenimiento especializado en bases de datos y seguridad Zero Trust.
                            </p>
                            <div className="w-12 h-12 border-2 border-blue-200 rounded-full flex items-center justify-center mx-auto animate-bounce">
                                <svg className="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 14l-7 7-7-7" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"/></svg>
                            </div>
                        </div>
                    </section>

                    <HardwareShowcase />

                    <section className="py-24 bg-white px-4 relative z-20">
                        <div className="max-w-4xl mx-auto text-center">
                            <h3 className="text-3xl font-bold mb-6 text-slate-900">Estándares Globales</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-8 opacity-50 grayscale">
                                <div className="p-4 border border-gray-100 rounded-xl flex flex-col items-center">
                                    <span className="text-2xl mb-2">🛡️</span>
                                    <p className="font-bold text-xs">ISO 27001</p>
                                </div>
                                <div className="p-4 border border-gray-100 rounded-xl flex flex-col items-center">
                                    <span className="text-2xl mb-2">💎</span>
                                    <p className="font-bold text-xs">ISO 9001</p>
                                </div>
                                <div className="p-4 border border-gray-100 rounded-xl flex flex-col items-center">
                                    <span className="text-2xl mb-2">⚙️</span>
                                    <p className="font-bold text-xs">ETL CERT</p>
                                </div>
                                <div className="p-4 border border-gray-100 rounded-xl flex flex-col items-center">
                                    <span className="text-2xl mb-2">💳</span>
                                    <p className="font-bold text-xs">PCI DSS</p>
                                </div>
                            </div>
                        </div>
                    </section>
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
