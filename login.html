<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - The Meyer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel CDN for JSX support in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.6s ease-out forwards; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- UTILS: PKCE CRYPTO HELPERS ---
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return Array.from(values).reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return crypto.subtle.digest('SHA-256', data);
        };

        const base64urlencode = (a) => {
            return btoa(String.fromCharCode.apply(null, new Uint8Array(a)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        };

        const PKCE_CONFIG = {
            clientId: 'YOUR_CLIENT_ID',
            authEndpoint: 'https://your-auth-provider.com/authorize',
            tokenEndpoint: 'https://your-auth-provider.com/token',
            redirectUri: window.location.origin + window.location.pathname,
            scope: 'openid profile email'
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    handleTokenExchange(code);
                }
            }, []);

            const initiateLogin = async (provider = 'sso') => {
                setLoading(true);
                try {
                    const verifier = generateRandomString(64);
                    const challengeBuffer = await sha256(verifier);
                    const challenge = base64urlencode(challengeBuffer);

                    sessionStorage.setItem('pkce_verifier', verifier);

                    const authUrl = new URL(PKCE_CONFIG.authEndpoint);
                    authUrl.searchParams.set('response_type', 'code');
                    authUrl.searchParams.set('client_id', PKCE_CONFIG.clientId);
                    authUrl.searchParams.set('redirect_uri', PKCE_CONFIG.redirectUri);
                    authUrl.searchParams.set('code_challenge', challenge);
                    authUrl.searchParams.set('code_challenge_method', 'S256');
                    authUrl.searchParams.set('scope', PKCE_CONFIG.scope);
                    
                    if (provider !== 'sso') {
                        authUrl.searchParams.set('connection', provider);
                    }

                    window.location.href = authUrl.toString();
                } catch (err) {
                    setError("Error al iniciar la autenticación segura.");
                    setLoading(false);
                }
            };

            const handleTokenExchange = async (code) => {
                setLoading(true);
                const verifier = sessionStorage.getItem('pkce_verifier');
                if (!verifier) {
                    setError("Sesión expirada. Por favor intente de nuevo.");
                    setLoading(false);
                    return;
                }

                try {
                    const response = await fetch(PKCE_CONFIG.tokenEndpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            client_id: PKCE_CONFIG.clientId,
                            grant_type: 'authorization_code',
                            code: code,
                            redirect_uri: PKCE_CONFIG.redirectUri,
                            code_verifier: verifier,
                        }),
                    });

                    const tokens = await response.json();
                    if (tokens.error) throw new Error(tokens.error_description);

                    localStorage.setItem('access_token', tokens.access_token);
                    sessionStorage.removeItem('pkce_verifier');
                    window.history.replaceState({}, document.title, window.location.pathname);
                    setUser({ name: "Authenticated User", email: "user@themeyer.eu" });
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="relative min-h-screen overflow-hidden bg-white">
                    <div className="absolute inset-0 z-0 pointer-events-none opacity-20">
                        <div className="absolute rounded-full bg-blue-100 blur-3xl animate-pulse" style={{ width: '400px', height: '400px', left: '-5%', top: '0' }}></div>
                        <div className="absolute rounded-full bg-indigo-50 blur-3xl animate-pulse" style={{ width: '300px', height: '300px', left: '70%', top: '10%' }}></div>
                    </div>

                    <div className="relative z-10 flex flex-col items-center justify-start p-6 pt-10">
                        <div className="max-w-md w-full glass p-10 rounded-[2.5rem] shadow-2xl border border-white/40 text-center animate-fade-in">
                            <img 
                                src="https://raw.githubusercontent.com/cypher-the-meyer/themeyer.eu/main/themeyerlogo" 
                                alt="The Meyer Logo" 
                                className="h-14 mx-auto mb-8 object-contain"
                            />
                            
                            <h2 className="text-3xl font-extrabold text-gray-900 mb-2 tracking-tight">Acceso Seguro</h2>
                            <p className="text-gray-500 mb-8 text-sm font-medium">Gestión de identidad para sistemas integrados.</p>

                            {error && (
                                <div className="mb-6 p-4 bg-red-50 text-red-600 rounded-2xl text-xs font-bold border border-red-100 uppercase tracking-wider">
                                    {error}
                                </div>
                            )}

                            {!user ? (
                                <div className="space-y-3">
                                    <button
                                        onClick={() => initiateLogin('sso')}
                                        disabled={loading}
                                        className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold transition-all transform hover:scale-[1.01] flex items-center justify-center space-x-3 disabled:opacity-50 shadow-xl shadow-blue-500/20"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                        </svg>
                                        <span>Acceder con Meyer SSO</span>
                                    </button>

                                    <div className="flex items-center my-6">
                                        <div className="flex-grow border-t border-gray-100"></div>
                                        <span className="px-4 text-[10px] text-gray-300 font-bold uppercase tracking-widest">O continuar con</span>
                                        <div className="flex-grow border-t border-gray-100"></div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <button
                                            onClick={() => initiateLogin('google')}
                                            disabled={loading}
                                            className="flex items-center justify-center space-x-2 py-3 px-4 rounded-xl border border-gray-100 bg-white hover:bg-gray-50 transition-all font-semibold text-gray-700 text-sm shadow-sm"
                                        >
                                            <svg className="w-3.5 h-3.5" viewBox="0 0 24 24">
                                                <path fill="#EA4335" d="M12.48 10.92v3.28h7.84c-.24 1.84-.9 3.22-1.9 4.22-1.24 1.24-3.14 2.12-6.7 2.12-5.46 0-9.92-4.44-9.92-9.9s4.46-9.9 9.92-9.9c3.12 0 5.34 1.24 7.02 2.84l2.32-2.32c-2.1-1.92-4.96-3.12-9.34-3.12-7.58 0-14.12 5.54-14.12 13.04s6.54 13.04 14.12 13.04c4.32 0 7.54-1.4 10-3.9 2.54-2.54 3.34-6.14 3.34-8.74 0-.6-.04-1.14-.14-1.64h-13.22z"/>
                                            </svg>
                                            <span>Google</span>
                                        </button>

                                        <button
                                            onClick={() => initiateLogin('apple')}
                                            disabled={loading}
                                            className="flex items-center justify-center space-x-2 py-3 px-4 rounded-xl bg-black text-white hover:bg-gray-900 transition-all font-semibold text-sm shadow-sm"
                                        >
                                            <svg className="w-3.5 h-3.5 fill-current" viewBox="0 0 384 512">
                                                <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
                                            </svg>
                                            <span>iCloud</span>
                                        </button>
                                    </div>

                                    <div className="pt-4">
                                        <button
                                            onClick={() => window.location.href = '/register'}
                                            className="text-xs font-bold text-gray-400 hover:text-blue-600 transition-colors uppercase tracking-widest"
                                        >
                                            ¿No tienes cuenta? <span className="text-blue-600">Regístrate</span>
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="text-left">
                                    <div className="p-5 bg-blue-50/50 border border-blue-100 rounded-2xl mb-6">
                                        <p className="text-[10px] text-blue-500 font-extrabold uppercase tracking-[0.2em] mb-2">Usuario Autenticado</p>
                                        <div className="flex items-center space-x-3">
                                            <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold">
                                                {user.email.charAt(0).toUpperCase()}
                                            </div>
                                            <div>
                                                <p className="text-gray-900 font-bold leading-tight">{user.name}</p>
                                                <p className="text-gray-500 text-xs">{user.email}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => window.location.href = '/dashboard'}
                                        className="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-lg"
                                    >
                                        Ir al Panel de Control
                                    </button>
                                </div>
                            )}

                            <p className="mt-10 text-[9px] text-gray-400 font-bold uppercase tracking-[0.3em] opacity-50">
                                THE MEYER &copy; 2025 • INFRAESTRUCTURA ÚNICA
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
