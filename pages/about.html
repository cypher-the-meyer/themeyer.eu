<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meyer - About Us</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #1a202c;
            overflow-x: hidden;
        }

        /* Bubbles - Original Blue Style */
        .bubble-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 0;
        }
        .bubble {
            position: absolute;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 50%;
            bottom: -100px;
            animation: rise var(--duration) infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-110%) scale(1.2); opacity: 0; }
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Mobile Menu */
        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-menu { transform: translateX(100%); }
        
        .menu-open #line1 { transform: rotate(45deg) translate(5px, 5px); }
        .menu-open #line2 { opacity: 0; }
        .menu-open #line3 { transform: rotate(-45deg) translate(5px, -5px); }

        .form-input { transition: all 0.3s ease; }
        .form-input:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.15);
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
            {/* Navigation */}
                    <nav className="fixed left-0 w-full z-50 px-6 md:px-8 py-4 flex justify-between items-center glass shadow-sm transition-all top-[40px]">
                        {/* THIS IS THE UPDATED LINE */}
                        <a href="https://themeyer.eu" className="block z-50">
                            <img src="https://raw.githubusercontent.com/cypher-the-meyer/themeyer.eu/main/themeyerlogo" alt="The Meyer Logo" className="h-10 md:h-12 w-auto object-contain" />
                        </a>
                        
                        {/* Desktop Links */}
                        <div className="hidden md:flex space-x-8 text-sm font-semibold tracking-widest uppercase opacity-60">
                            <a href="/pages/hardware" className="hover:text-blue-600 transition-colors">Hardware</a>
                            <a href="/pages/software" className="hover:text-blue-600 transition-colors">Sofwtare</a>
                            <a href="/pages/about" className="hover:text-blue-600 transition-colors">About Us</a>
                        </div>

                        <div className="flex items-center space-x-4">
                        {/* Desktop CONTACTO Button */}
                        <button 
                            onClick={() => window.location.href = '/pages/about'} 
                            className="hidden sm:block bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full text-sm font-bold transition-all transform hover:scale-105 shadow-md"
                        >
                            CONTACTO
                        </button>
                        
                        {/* Mobile Menu Toggle */}
                        <button onClick={toggleMenu} className={`md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 focus:outline-none z-[110] ${isMobileMenuOpen ? 'menu-open' : ''}`}>
                            <span className="block w-6 h-0.5 bg-gray-900 transition-transform duration-300" id="line1"></span>
                            <span className="block w-6 h-0.5 bg-gray-900 transition-opacity duration-300" id="line2"></span>
                            <span className="block w-6 h-0.5 bg-gray-900 transition-transform duration-300" id="line3"></span>
                        </button>
                    </div>
                </nav>
                    
                {/* Mobile Menu */}
                <div id="mobile-menu" className={`fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] md:hidden flex flex-col items-center justify-center space-y-8 ${isMobileMenuOpen ? '' : 'hidden-menu'}`}>
                    {/* FIX 2: Removed "hidden" class from here so links show on mobile */}
                    <div className="flex flex-col items-center space-y-8 text-xl font-bold tracking-[0.2em] uppercase text-gray-900">
                        <a href="pages/hardware" className="mobile-link hover:text-blue-600 transition-colors" onClick={toggleMenu}>Hardware</a>
                        <a href="/pages/software" className="mobile-link hover:text-blue-600 transition-colors" onClick={toggleMenu}>Software</a>
                        <a href="/pages/about" className="mobile-link hover:text-blue-600 transition-colors" onClick={toggleMenu}>About Us</a>
                    </div>
                    
                    {/* Mobile CONTACTO Button */}
                    <button 
                        onClick={() => {
                            toggleMenu();
                            window.location.href = '/pages/contacto';
                        }} 
                        className="bg-blue-600 text-white px-10 py-4 rounded-full text-lg font-bold shadow-xl"
                    >
                        CONTACTO
                    </button>
                </div>

        // --- LAYOUT COMPONENT ---
        const Layout = ({ children }) => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const toggleMenu = () => setIsMobileMenuOpen(!isMobileMenuOpen);

            return (
                <div className="relative min-h-screen">
                    <div className="bubble-bg fixed inset-0 h-screen w-full">
                        <div className="bubble" style={{ width: '300px', height: '300px', left: '10%', '--duration': '15s' }}></div>
                        <div className="bubble" style={{ width: '200px', height: '200px', left: '60%', '--duration': '12s', animationDelay: '2s' }}></div>
                        <div className="bubble" style={{ width: '150px', height: '150px', left: '30%', '--duration': '18s', animationDelay: '5s' }}></div>
                        <div className="bubble" style={{ width: '100px', height: '100px', left: '80%', '--duration': '20s', animationDelay: '1s' }}></div>
                    </div>

                    {/* Banner Superior */}
                    <div className="fixed top-0 w-full h-10 bg-[#0f172a] z-[60] flex items-center justify-between px-8 overflow-hidden">
                        <span className="text-[9px] md:text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] whitespace-nowrap">
                             SUSTENTABILIDAD CORPORATIVA & ESG
                        </span>
                        <div className="flex items-center space-x-4 opacity-60 grayscale hover:grayscale-0 transition-all duration-500 overflow-x-auto no-scrollbar">
                            {['ODS 6', 'ODS 11', 'ODS 13', 'AGENDA 2030'].map((cert, i) => (
                                <div key={i} className="flex items-center space-x-1 flex-shrink-0">
                                    <div className="w-1 h-3 bg-blue-500"></div>
                                    <span className="text-[9px] font-bold text-white tracking-widest uppercase">{cert}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <nav className="fixed left-0 w-full z-50 px-6 md:px-8 py-4 flex justify-between items-center glass shadow-sm transition-all top-[40px]">
                        <a href="https://themeyer.eu" className="block z-50">
                            <img src="https://raw.githubusercontent.com/cypher-the-meyer/themeyer.eu/main/themeyerlogo" alt="Logo" className="h-10 md:h-12 w-auto object-contain" />
                        </a>
                        
                        <div className="hidden md:flex space-x-8 text-sm font-semibold tracking-widest uppercase opacity-60">
                            <a href="/pages/hardware" className="hover:text-blue-600 transition-colors">Hardware</a>
                            <a href="/pages/software" className="hover:text-blue-600 transition-colors">Software</a>
                            <a href="/pages/about" className="hover:text-blue-600 transition-colors">About Us</a>
                        </div>

                        <div className="flex items-center space-x-4">
                            <button onClick={() => window.location.href = '#form-section'} className="hidden sm:block bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full text-sm font-bold transition-all shadow-md">
                                CONTACTO
                            </button>
                            <button onClick={toggleMenu} className={`md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 z-[110] ${isMobileMenuOpen ? 'menu-open' : ''}`}>
                                <span className="block w-6 h-0.5 bg-gray-900" id="line1"></span>
                                <span className="block w-6 h-0.5 bg-gray-900" id="line2"></span>
                                <span className="block w-6 h-0.5 bg-gray-900" id="line3"></span>
                            </button>
                        </div>
                    </nav>

                    <div id="mobile-menu" className={`fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] md:hidden flex flex-col items-center justify-center space-y-8 ${isMobileMenuOpen ? '' : 'hidden-menu'}`}>
                        <a href="pages/hardware" className="text-xl font-bold uppercase" onClick={toggleMenu}>Hardware</a>
                        <a href="/pages/software" className="text-xl font-bold uppercase" onClick={toggleMenu}>Software</a>
                        <button onClick={() => {toggleMenu(); window.location.href = '#form-section'}} className="bg-blue-600 text-white px-10 py-4 rounded-full text-lg font-bold">CONTACTO</button>
                    </div>

                    <main className="pt-32 px-4 md:px-8">
                        {children}
                    </main>
                </div>
            );
        };

        // --- CONTACT FORM COMPONENT ---
        const ContactForm = () => {
            const [status, setStatus] = useState({ loading: false, submitted: false, error: false });

            const handleSubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);

                if (formData.get("telefono_secundario")) {
                    setStatus({ loading: false, submitted: true, error: false });
                    e.target.reset();
                    return; 
                }

                setStatus({ loading: true, submitted: false, error: false });

                const searchParams = new URLSearchParams();
                for (let [key, value] of formData.entries()) {
                    if (typeof value === 'string' && /^[=+\-@]/.test(value)) {
                        value = "'" + value;
                    }
                    searchParams.append(key, value);
                }

                const scriptUrl = "https://script.google.com/macros/s/AKfycbzaqYJQIIWYBcbq0FCo38ulhTuYxGZxVVUOv1CklQ9mEJ_hheLsjvL3CYG9YUdfRDYl/exec"; 

                try {
                    await fetch(scriptUrl, { method: 'POST', body: searchParams, mode: 'no-cors' });
                    setStatus({ loading: false, submitted: true, error: false });
                    e.target.reset();
                } catch (error) {
                    setStatus({ loading: false, submitted: false, error: true });
                }
            };

            if (status.submitted) {
                return (
                    <div className="p-12 text-center bg-white/80 rounded-3xl shadow-xl max-w-2xl mx-auto my-12 animate-fade-in border border-green-100">
                        <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <h2 className="text-2xl font-extrabold text-gray-800 mb-2">¡RECIBIDO!</h2>
                        <p className="text-gray-500">Nos pondremos en contacto con usted a la brevedad.</p>
                        <button onClick={() => setStatus({ ...status, submitted: false })} className="mt-8 text-blue-600 font-bold hover:underline">Enviar otro mensaje</button>
                    </div>
                );
            }

            return (
                <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    <div className="absolute left-[-9999px] top-[-9999px]" aria-hidden="true">
                        <input type="text" name="telefono_secundario" tabIndex="-1" autoComplete="off" />
                    </div>

                    {[
                        { label: 'NOMBRE', name: 'NOMBRE', type: 'text', placeholder: 'Nombre completo', req: true },
                        { label: 'ORGANIZACIÓN', name: 'ORGANIZACIÓN', type: 'text', placeholder: 'Nombre de su empresa', req: true },
                        { label: 'TELÉFONO', name: 'TELÉFONO', type: 'tel', placeholder: '+52...', req: true },
                        { label: 'EMAIL', name: 'EMAIL', type: 'email', placeholder: 'correo@ejemplo.com', req: true }
                    ].map((f, i) => (
                        <div key={i} className="flex flex-col">
                            <label className="mb-1 text-sm font-semibold text-gray-700">{f.label} {f.req && '*'}</label>
                            <input type={f.type} name={f.name} placeholder={f.placeholder} required={f.req} className="px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all" />
                        </div>
                    ))}

                    <div className="flex flex-col md:col-span-2">
                        <label className="mb-1 text-sm font-semibold text-gray-700">TECNOLOGÍA *</label>
                        <select name="TECNOLOGÍA" required defaultValue="" className="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white focus:ring-2 focus:ring-blue-500 outline-none appearance-none cursor-pointer">
                            <option value="" disabled>Seleccione una opción...</option>
                            <option value="(Water from Air) Watergen">Watergen (Atmosférica)</option>
                            <option value="System Technology Consulting">Consultoría Sistemas</option>
                            <option value="API Cloud Integrations">Integraciones API</option>
                        </select>
                    </div>

                    {status.error && <div className="md:col-span-2 text-red-500 text-sm text-center">Error al enviar. Intente de nuevo.</div>}

                    <div className="md:col-span-2 mt-6">
                        <button type="submit" disabled={status.loading} className={`w-full py-5 text-white font-extrabold rounded-2xl shadow-xl transition-all ${status.loading ? 'bg-blue-400' : 'bg-blue-600 hover:bg-blue-700'}`}>
                            {status.loading ? "PROCESANDO..." : "SOLICITAR INFORMACIÓN"}
                        </button>
                    </div>
                </form>
            );
        };

        // --- APP COMPONENT ---
        const App = () => {
            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);
                gsap.from("#title-anim", { duration: 1, y: 30, opacity: 0, ease: "power3.out" });
                gsap.from("#ods-card", { scrollTrigger: { trigger: "#ods-card", start: "top 85%" }, y: 60, opacity: 0, duration: 1.2 });
            }, []);

            return (
                <Layout>
                    <section className="relative py-12 px-8 text-center z-10">
                        <h1 className="text-4xl md:text-6xl font-extrabold text-gray-900 mb-4" id="title-anim">
                            Open Source <span className="text-blue-600">Tech Firm</span>
                        </h1>
                        <p className="text-gray-500 max-w-2xl mx-auto text-lg leading-relaxed">
                            Your effort can make the change.
                        </p>
                    </section>

                    <section className="py-20 px-4 md:px-8 bg-[#f8faff]/50 rounded-[3rem] z-20 mb-20 border border-blue-50">
                        <div className="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center glass rounded-[2.5rem] p-12 shadow-2xl" id="ods-card">
                            <div>
                                <h2 className="text-3xl font-extrabold text-gray-900 mb-6">Agua Limpia y Saneamiento</h2>
                                <p className="text-gray-600 text-lg mb-6">The Meyer utiliza tecnología de generación atmosférica para descentralizar el acceso al agua potable sin generar residuos plásticos.</p>
                                <ul className="space-y-3 mb-8 text-gray-600 font-medium">
                                    <li>✓ Creación de agua desde la humedad del aire.</li>
                                    <li>✓ Eliminación de transporte contaminante.</li>
                                    <li>✓ Agua mineralizada premium in-situ.</li>
                                </ul>
                                <a href="https://www.un.org/sustainabledevelopment/es/water-and-sanitation/" target="_blank" className="text-blue-600 font-bold hover:underline">Leer más sobre el ODS 6 →</a>
                            </div>
                            <div className="rounded-2xl overflow-hidden shadow-lg aspect-square">
                                <img src="https://raw.githubusercontent.com/cypher-the-meyer/themeyer.eu/main/media/AfricaWatergen.png" alt="Clean Water" className="w-full h-full object-cover" />
                            </div>
                        </div>
                    </section>

                    <div id="form-section" className="max-w-4xl mx-auto px-4 pb-20 relative z-20">
                        <div className="glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-white">
                            <h2 className="text-3xl font-extrabold text-center text-gray-900 mb-2">Solicitar Información</h2>
                            <p className="text-center text-gray-500 mb-10">Nuestro equipo de expertos se pondrá en contacto con usted.</p>
                            <ContactForm />
                        </div>
                    </div>
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
