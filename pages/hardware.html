<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meyer - Nosotros</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #1a202c;
            overflow-x: hidden;
        }

        /* Bubbles - Original Blue Style */
        .bubble-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 0;
        }
        .bubble {
            position: absolute;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 50%;
            bottom: -100px;
            animation: rise var(--duration) infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-110%) scale(1.2); opacity: 0; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-menu { transform: translateX(100%); }
        
        .menu-open #line1 { transform: translateY(8px) rotate(45deg); }
        .menu-open #line2 { opacity: 0; }
        .menu-open #line3 { transform: translateY(-8px) rotate(-45deg); }

        .form-input { transition: all 0.3s ease; }
        .form-input:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.15);
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- LAYOUT COMPONENT ---
        const Layout = ({ children }) => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const toggleMenu = () => setIsMobileMenuOpen(!isMobileMenuOpen);

            // Logic to handle Contact redirection or scroll
            const handleContactClick = () => {
                const formElement = document.getElementById('form-section');
                
                if (formElement) {
                    formElement.scrollIntoView({ behavior: 'smooth' });
                } else {
                    window.location.href = '/index.html#form-section';
                }
                
                if (isMobileMenuOpen) toggleMenu();
            };

            return (
                <div className="relative min-h-screen">
                    {/* Background Bubbles */}
                    <div className="bubble-bg fixed inset-0 h-screen w-full">
                        {[15, 12, 18, 20, 14].map((dur, i) => (
                            <div key={i} className="bubble" style={{ 
                                width: `${200 + (i * 20)}px`, 
                                height: `${200 + (i * 20)}px`, 
                                left: `${10 + (i * 15)}%`, 
                                '--duration': `${dur}s`,
                                animationDelay: `${i * 1.5}s`
                            }}></div>
                        ))}
                    </div>

                    {/* Top Banner */}
                    <div className="fixed top-0 w-full h-10 bg-[#0f172a] z-[120] flex items-center justify-between px-8 overflow-hidden">
                        <span className="text-[9px] md:text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] whitespace-nowrap">
                            SUSTENTABILIDAD CORPORATIVA & ESG
                        </span>
                        <div className="flex items-center space-x-4 md:space-x-8 opacity-60 grayscale hover:grayscale-0 transition-all duration-500 overflow-x-auto no-scrollbar">
                            {['ODS 6', 'ODS 11', 'ODS 13', 'AGENDA 2030', 'ESG COMPLIANT'].map((cert, index) => (
                                <div key={index} className="flex items-center space-x-1 flex-shrink-0">
                                    <div className="w-1 h-3 bg-blue-500"></div>
                                    <span className="text-[9px] font-bold text-white tracking-widest uppercase">{cert}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Navigation */}
                    <nav className="fixed left-0 w-full z-[110] px-6 md:px-8 py-4 flex justify-between items-center glass shadow-sm transition-all top-[40px]">
                        <a href="/" className="block z-50">
                            <img src="https://raw.githubusercontent.com/cypher-the-meyer/themeyer.eu/main/themeyerlogo" alt="The Meyer Logo" className="h-10 md:h-12 w-auto object-contain" />
                        </a>
                        
                        <div className="hidden md:flex space-x-8 text-sm font-semibold tracking-widest uppercase opacity-60">
                            <a href="/pages/hardware" className="hover:text-blue-600 transition-colors">Hardware</a>
                            <a href="/pages/software" className="hover:text-blue-600 transition-colors">Software</a>
                            <a href="/pages/about" className="hover:text-blue-600 transition-colors">About Us</a>
                        </div>

                        <div className="flex items-center space-x-4">
                            <button 
                                onClick={handleContactClick}
                                className="hidden sm:block bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full text-sm font-bold transition-all transform hover:scale-105 shadow-md"
                            >
                                CONTACTO
                            </button>
                            
                            <button onClick={toggleMenu} className={`md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 focus:outline-none z-[120] relative ${isMobileMenuOpen ? 'menu-open' : ''}`}>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-all duration-300" id="line1"></span>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-all duration-300" id="line2"></span>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-all duration-300" id="line3"></span>
                            </button>
                        </div>
                    </nav>
                        
                    {/* Mobile Menu */}
                    <div id="mobile-menu" className={`fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] md:hidden flex flex-col items-center justify-center space-y-8 ${isMobileMenuOpen ? '' : 'hidden-menu'}`}>
                        <div className="flex flex-col items-center space-y-8 text-xl font-bold tracking-[0.2em] uppercase text-gray-900">
                            <a href="/pages/hardware" className="mobile-link hover:text-blue-600 transition-colors" onClick={toggleMenu}>Hardware</a>
                            <a href="/pages/software" className="mobile-link hover:text-blue-600 transition-colors" onClick={toggleMenu}>Software</a>
                            <a href="/pages/about" className="mobile-link hover:text-blue-600 transition-colors" onClick={toggleMenu}>About Us</a>
                        </div>
                        
                        <button 
                            onClick={handleContactClick}
                            className="bg-blue-600 text-white px-10 py-4 rounded-full text-lg font-bold shadow-xl"
                        >
                            CONTACTO
                        </button>
                    </div>

                    <main className="pt-32 px-4 md:px-8">
                        {children}
                    </main>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeCategory, setActiveCategory] = useState("Todas las Categorías");
            const [isExpressOnly, setIsExpressOnly] = useState(false);
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const [products, setProducts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const dropdownRef = useRef(null);

            const PRODUCT_CATEGORIES = [
                "Todas las Categorías",
                "1. Cerebros y Procesamiento (Core)",
                "2. Componentes de Alimentación",
                "3. Conectores y HATs",
                "4. Sensores",
                "6. Interfaces y Visualización",
                "7. Comunicación y Redes",
                "8. Estructura y Montaje",
                "9. Kits de Iniciación"
            ];

            const MOCK_PRODUCTS = [
                { id: 1, name: "Microcontrolador RP2040 Dual ARM", category: "1. Cerebros y Procesamiento (Core)", price: "$4.50", isExpress: true, image: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=400" },
                { id: 2, name: "Módulo de Batería LiPo Gestión", category: "2. Componentes de Alimentación", price: "$18.90", isExpress: false, image: "https://images.unsplash.com/photo-1612815154858-60aa4c59eaa6?w=400" },
                { id: 4, name: "Sensor Ambiental (VOCs)", category: "4. Sensores", price: "$15.50", isExpress: true, image: "https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=400" },
                { id: 7, name: "Carcasa Aluminio Disipación", category: "8. Estructura y Montaje", price: "$14.99", isExpress: true, image: "https://images.unsplash.com/photo-1631553127986-e3d17462ecce?w=400" }
            ];

            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);
                gsap.from("#title-anim", { duration: 1, y: 30, opacity: 0, ease: "power3.out" });
                
                const handleClickOutside = (e) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsDropdownOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            useEffect(() => {
                setIsLoading(true);
                const timer = setTimeout(() => {
                    let filtered = activeCategory === "Todas las Categorías" ? MOCK_PRODUCTS : MOCK_PRODUCTS.filter(p => p.category === activeCategory);
                    if (isExpressOnly) filtered = filtered.filter(p => p.isExpress);
                    setProducts(filtered);
                    setIsLoading(false);
                    setTimeout(() => ScrollTrigger.refresh(), 100);
                }, 400);
                return () => clearTimeout(timer);
            }, [activeCategory, isExpressOnly]);

            return (
                <Layout>
                    <section className="relative py-12 px-8 text-center z-10">
                        <h1 className="text-4xl md:text-6xl font-extrabold text-gray-900 tracking-tight mb-4" id="title-anim">
                            Tecnologías que <span className="text-blue-600">Transforman</span>
                        </h1>
                        <p className="text-gray-500 max-w-2xl mx-auto text-lg">
                            Descubra nuestro portafolio de soluciones patentadas para dermoestética y sustentabilidad.
                        </p>
                    </section>

                    {/* WishPro Section */}
                    <section className="py-16 px-4 md:px-8 relative z-20">
                        <div className="max-w-6xl mx-auto">
                            <div className="grid md:grid-cols-2 gap-12 items-center glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl border border-white">
                                <div className="order-2 md:order-1 text-left">
                                    <span className="text-purple-600 font-bold text-xs uppercase tracking-widest mb-4 flex items-center gap-2">
                                        <div className="w-2 h-2 rounded-full bg-purple-500"></div> Estética Avanzada
                                    </span>
                                    <h2 className="text-3xl md:text-4xl font-extrabold mb-6">WishPro: Infusión Magnética</h2>
                                    <p className="text-gray-600 text-lg mb-8">Pulsos magnéticos con cápsulas de principios activos avanzados.</p>
                                    <button className="bg-gray-900 hover:bg-purple-700 text-white px-8 py-3 rounded-full font-bold transition-all shadow-lg">SABER MÁS</button>
                                </div>
                                <div className="order-1 md:order-2 rounded-2xl overflow-hidden shadow-lg aspect-video">
                                    <img src="https://raw.githubusercontent.com/cypher-the-meyer/themeyer.eu/main/media/Wishpro.png" className="w-full h-full object-cover" alt="WishPro" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Hardware Catalog Section */}
                    <section className="py-12 px-4 md:px-8 relative z-20">
                        <div className="max-w-6xl mx-auto">
                            <div className="mb-10 text-center">
                                <h2 className="text-3xl font-extrabold text-gray-900">Catálogo Hardware</h2>
                            </div>

                            {/* Filters Bar */}
                            <div className="mb-12 flex justify-center z-[99] relative">
                                <div className="glass px-6 py-3 rounded-full flex items-center gap-6 shadow-xl border border-white/50 w-full max-w-2xl justify-between">
                                    <div className="relative flex-1" ref={dropdownRef}>
                                        <button onClick={() => setIsDropdownOpen(!isDropdownOpen)} className="flex items-center justify-between w-full text-left">
                                            <div className="flex flex-col">
                                                <span className="text-[10px] text-gray-400 font-bold uppercase">Categoría</span>
                                                <span className="text-sm font-bold text-gray-800 truncate">{activeCategory}</span>
                                            </div>
                                            <svg className={`w-4 h-4 transition-transform ${isDropdownOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 9l-7 7-7-7"></path></svg>
                                        </button>
                                        {isDropdownOpen && (
                                            <div className="absolute top-[calc(100%+15px)] left-0 w-72 bg-white rounded-2xl shadow-2xl border overflow-hidden z-[100]">
                                                <div className="max-h-64 overflow-y-auto py-2">
                                                    {PRODUCT_CATEGORIES.map((cat, i) => (
                                                        <button key={i} onClick={() => { setActiveCategory(cat); setIsDropdownOpen(false); }} className={`w-full text-left px-5 py-3 text-sm hover:bg-gray-50 ${activeCategory === cat ? 'text-blue-600 font-bold' : ''}`}>
                                                            {cat}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="h-8 w-[1px] bg-gray-200"></div>
                                    <label className="flex items-center cursor-pointer">
                                        <input type="checkbox" className="sr-only" checked={isExpressOnly} onChange={() => setIsExpressOnly(!isExpressOnly)}/>
                                        <div className={`w-10 h-5 rounded-full transition-colors ${isExpressOnly ? 'bg-blue-600' : 'bg-gray-200'}`}></div>
                                        <span className="ml-3 text-[10px] font-bold text-gray-500 uppercase">24h</span>
                                    </label>
                                </div>
                            </div>

                            {/* Product Grid */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {isLoading ? (
                                    <div className="col-span-full py-20 text-center">Cargando...</div>
                                ) : products.length > 0 ? products.map(product => (
                                    <div key={product.id} className="bg-white rounded-[2.5rem] shadow-xl border border-gray-100 overflow-hidden group hover:shadow-2xl transition-all">
                                        <div className="aspect-square bg-gray-50 overflow-hidden">
                                            <img src={product.image} alt={product.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"/>
                                        </div>
                                        <div className="p-6">
                                            <h3 className="font-bold text-sm text-gray-900 mb-2">{product.name}</h3>
                                            <div className="flex justify-between items-center">
                                                <p className="text-blue-600 font-black text-xl">{product.price}</p>
                                                <button className="bg-gray-100 p-2 rounded-xl hover:bg-black hover:text-white transition-colors">
                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 4v16m8-8H4"></path></svg>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="col-span-full py-20 text-center text-gray-400 font-bold">Sin resultados</div>
                                )}
                            </div>
                        </div>
                    </section>
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
