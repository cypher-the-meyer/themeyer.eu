<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meyer - Hardware</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #1a202c;
            overflow-x: hidden;
        }

        /* Bubbles - Original Blue Style */
        .bubble-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 0;
        }
        .bubble {
            position: absolute;
            background: rgba(59, 130, 246, 0.08); /* Original Blue */
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 50%;
            bottom: -100px;
            animation: rise var(--duration) infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-110%) scale(1.2); opacity: 0; }
        }

        /* Glassmorphism - Original Style */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Mobile Menu */
        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-menu { transform: translateX(100%); }
        
        /* Menu Hamburger Animation */
        .menu-open #line1 { transform: rotate(45deg) translate(5px, 5px); }
        .menu-open #line2 { opacity: 0; }
        .menu-open #line3 { transform: rotate(-45deg) translate(5px, -5px); }

        /* Form Inputs */
        .form-input { transition: all 0.3s ease; }
        .form-input:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.15); /* Blue shadow focus */
        }
        
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <div id="root"></div>

                                onClick={() => window.location.href = 'pages/about.html'}

                            >

                            </button>

                                <span className="block w-6 h-0.5 bg-gray-900 transition-opacity duration-300" id="line2"></span>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-transform duration-300" id="line3"></span>
                            </button>
                        </div>
                    </nav>

                    <div className={`fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] md:hidden flex flex-col items-center justify-center space-y-8 transition-opacity duration-300 ${isMobileMenuOpen ? 'opacity-100' : 'hidden-menu'}`}>
                        <a href="pages/hardware.html" className="text-xl font-bold uppercase hover:text-blue-600" onClick={toggleMenu}>Hardware</a>
                        <a href="pages/software.html" className="text-xl font-bold uppercase hover:text-blue-600" onClick={toggleMenu}>Software</a>

            "4. Sensores (Entradas de Domótica)",
            "6. Interfaces de Usuario y Visualización",
            "7. Comunicación y Redes",
            "8. Estructura, Carcasas y Montaje",
            "9. Kits de Iniciación"
        ];

        const MOCK_PRODUCTS = [
            { id: 1, name: "Microcontrolador RP2040 Dual ARM Cortex-M0+", category: "1. Cerebros y Procesamiento (Core)", price: "$4.50", deliveryTime: "1-2 días", stock: 150, image: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=400" },
            { id: 2, name: "Módulo de Batería LiPo con Gestión Integrada", category: "2. Componentes de Alimentación y Gestión Energética", price: "$18.90", deliveryTime: "3-5 días", stock: 45, image: "https://images.unsplash.com/photo-1612815154858-60aa4c59eaa6?auto=format&fit=crop&q=80&w=400" },
            { id: 3, name: "HAT de Expansión de E/S 32 Canales", category: "3. Conectores, Cables y Expansión (HATs)", price: "$24.00", deliveryTime: "2-4 días", stock: 12, image: "https://images.unsplash.com/photo-1555664424-778a1e5e1b48?auto=format&fit=crop&q=80&w=400" },
            { id: 4, name: "Sensor Ambiental (Temp, Humedad, VOCs)", category: "4. Sensores (Entradas de Domótica)", price: "$15.50", deliveryTime: "1-2 días", stock: 89, image: "https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&q=80&w=400" },
            { id: 5, name: "Pantalla Táctil Capacitiva 7'' DSI", category: "6. Interfaces de Usuario y Visualización", price: "$65.00", deliveryTime: "5-7 días", stock: 5, image: "https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?auto=format&fit=crop&q=80&w=400" },

                gsap.registerPlugin(ScrollTrigger);

                    scrollTrigger: { trigger: "#wishpro-card", start: "top 85%" },
                    y: 60, opacity: 0, duration: 1.2, ease: "power4.out"

                gsap.from("#watergen-card", {
                    scrollTrigger: { trigger: "#watergen-card", start: "top 85%" },
                    y: 60, opacity: 0, duration: 1.2, delay: 0.2, ease: "power4.out"
                });

                setTimeout(() => ScrollTrigger.refresh(), 500);
            }, []);

            // Simulate Data Fetch for Products
            useEffect(() => {
                setIsLoading(true);
                const fetchTimer = setTimeout(() => {
                    const filtered = activeCategory === "Todos" 
                        ? MOCK_PRODUCTS 
                        : MOCK_PRODUCTS.filter(p => p.category === activeCategory);
                    setProducts(filtered);
                    setIsLoading(false);
                    // Refresh ScrollTrigger after DOM changes
                    setTimeout(() => ScrollTrigger.refresh(), 100);
                }, 600); // 600ms artificial delay to show fetch state

                return () => clearTimeout(fetchTimer);
            }, [activeCategory]);

            return (
                <Layout>

                            </h1>
                            <p className="text-gray-500 max-w-2xl mx-auto font-medium text-lg leading-relaxed" id="subtitle-anim">
                                Descubra nuestro portafolio de soluciones patentadas. Desde la revolución dermoestética hasta la generación de recursos vitales.
                            </p>
                        </div>
                    </section>

                    {/* WISHPRO Section */}

                                        <div className="w-2 h-2 rounded-full bg-purple-500"></div>
                                        Estética Avanzada
                                    </span>
                                    <h2 className="text-3xl md:text-4xl font-extrabold text-gray-900 mb-6 leading-tight">
                                        WishPro: Infusión Magnética
                                    </h2>
                                    <p className="text-gray-600 text-lg leading-relaxed mb-6">
                                        La única tecnología del mundo que combina pulsos magnéticos con cápsulas de principios activos avanzados. Tratamientos no invasivos con resultados inmediatos.
                                    </p>
                                    <ul className="space-y-3 mb-8">
                                        <li className="flex items-start">
                                            <span className="text-purple-500 mr-2">✓</span>
                                            <span className="text-gray-600 font-medium">Tecnología MIT (Magnetic Infusion Technology).</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-purple-500 mr-2">✓</span>
                                            <span className="text-gray-600 font-medium">Sin agujas, sin dolor, sin tiempo de recuperación.</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-purple-500 mr-2">✓</span>
                                            <span className="text-gray-600 font-medium">Cápsulas unitarias higiénicas y patentadas.</span>
                                        </li>
                                    </ul>
                                    <div className="pt-2">
                                        <button className="bg-gray-900 hover:bg-purple-700 text-white px-8 py-3 rounded-full font-bold transition-all shadow-lg hover:shadow-purple-500/25 transform hover:translate-x-1 flex items-center group">
                                            <span>MÁS INFORMACIÓN</span>
                                            <svg className="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                        </button>
                                    </div>
                                </div>
                                <div className="order-1 md:order-2 overflow-hidden rounded-2xl aspect-square md:aspect-[4/3] relative group shadow-lg">
                                    <img 
                                        src="https://raw.githubusercontent.com/cypher-the-meyer/themeyer.eu/main/media/Wishpro.png" 
                                        alt="WishPro Device Treatment" 
                                        className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700"
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-purple-900/40 to-transparent"></div>
                                    <div className="absolute top-6 right-6 bg-white/90 backdrop-blur text-purple-900 font-bold px-4 py-1 rounded-full text-xs shadow-sm">
                                        PATENTADO
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* WATERGEN Section */}
                    <section className="py-8 md:py-16 px-4 md:px-8 relative z-20 mb-6">
                        <div className="max-w-6xl mx-auto">
                            <div className="grid md:grid-cols-2 gap-12 items-center glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-blue-500/5 border border-white" id="watergen-card">
                                {/* Image First on Desktop */}
                                <div className="order-1 overflow-hidden rounded-2xl aspect-square md:aspect-[4/3] relative group shadow-lg">
                                    <img 
                                        src="https://raw.githubusercontent.com/cypher-the-meyer/themeyer.eu/main/media/Watergen%20GEN-M%201.jpg" 
                                        alt="Watergen GEN-M 1 Atmospheric Generator" 
                                        className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700"
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-blue-900/50 to-transparent"></div>
                                    <div className="absolute bottom-6 left-6 text-white font-bold text-xl drop-shadow-md">
                                        #DrinkingAir
                                    </div>
                                </div>
                                
                                <div className="order-2 flex flex-col justify-center">
                                    <span className="text-blue-600 font-bold text-xs uppercase tracking-widest mb-4 flex items-center gap-2">
                                        <div className="w-2 h-2 rounded-full bg-blue-500"></div>
                                        Sustentabilidad Hídrica
                                    </span>
                                    <h2 className="text-3xl md:text-4xl font-extrabold text-gray-900 mb-6 leading-tight">
                                        Watergen: Agua del Aire

                                            <span className="text-gray-600 font-medium">GENius™ Module: Eficiencia energética inigualable.</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-blue-500 mr-2">✓</span>

                                        </li>

                                        </li>

                                            <span>MÁS INFORMACIÓN</span>
                                            <svg className="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>

                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* HARDWARE PRODUCTS CAROUSEL SECTION */}
                    <section className="py-12 md:py-16 px-4 md:px-8 relative z-20 mb-12 overflow-hidden">
                        <div className="max-w-6xl mx-auto">
                            
                            {/* Section Header */}
                            <div className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
                                <div>
                                    <span className="text-blue-600 font-bold text-xs uppercase tracking-widest mb-2 flex items-center gap-2">
                                        <div className="w-2 h-2 rounded-full bg-blue-500"></div>
                                        Catálogo de Componentes
                                    </span>
                                    <h2 className="text-3xl font-extrabold text-gray-900">
                                        Hardware & Accesorios
                                    </h2>
                                </div>
                            </div>

                            {/* Pill Filter Bar */}
                            <div className="flex overflow-x-auto gap-3 pb-4 mb-6 no-scrollbar snap-x">
                                {PRODUCT_CATEGORIES.map((category, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => setActiveCategory(category)}
                                        className={`snap-start whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-semibold transition-all duration-300 border ${
                                            activeCategory === category 
                                            ? 'bg-gray-900 text-white border-gray-900 shadow-md' 
                                            : 'bg-white text-gray-600 border-gray-200 hover:border-gray-300 hover:bg-gray-50'
                                        }`}

                                        {category}
                                    </button>
                                ))}
                            </div>

                            {/* Products Carousel */}
                            {isLoading ? (
                                <div className="flex justify-center items-center h-72">
                                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                                </div>
                            ) : (
                                <div className="flex gap-6 overflow-x-auto pb-8 snap-x no-scrollbar">
                                    {products.length > 0 ? products.map(product => (
                                        <div 
                                            key={product.id} 
                                            className="w-72 md:w-80 aspect-square flex-shrink-0 snap-start bg-white rounded-[2rem] shadow-xl shadow-gray-200/50 border border-gray-100 flex flex-col overflow-hidden group hover:shadow-2xl hover:shadow-blue-500/10 transition-all duration-300"

                                                    src={product.image} 
                                                    alt={product.name}

                                                    {product.stock > 0 ? `STOCK: ${product.stock}` : 'AGOTADO'}
                                                </div>
                                            </div>
                                            
                                            {/* Details Half */}
                                            <div className="h-[45%] p-5 flex flex-col justify-between bg-white relative z-10">
                                                <div>
                                                    <h3 className="font-bold text-gray-900 leading-tight line-clamp-2 mb-1 group-hover:text-blue-600 transition-colors">
                                                        {product.name}
                                                    </h3>
                                                    <p className="text-blue-600 font-black text-xl">
                                                        {product.price}
                                                    </p>
                                                </div>

                                                    <div className="flex items-center text-xs text-gray-500 font-medium">
                                                        <svg className="w-4 h-4 mr-1 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
