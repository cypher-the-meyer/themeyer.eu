<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Networking & Selección de Talento Nearshore</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #1a202c;
            overflow-x: hidden;
        }

        .bubble-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 0;
        }
        .bubble {
            position: absolute;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 50%;
            bottom: -100px;
            animation: rise var(--duration) infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-110%) scale(1.2); opacity: 0; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .menu-open #line1 { transform: translateY(8px) rotate(45deg); }
        .menu-open #line2 { opacity: 0; }
        .menu-open #line3 { transform: translateY(-8px) rotate(-45deg); }

        .section-gradient {
            background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Layout = ({ children }) => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const toggleMenu = () => setIsMobileMenuOpen(!isMobileMenuOpen);

            return (
                <div className="relative min-h-screen">
                    {/* Background animado */}
                    <div className="bubble-bg fixed inset-0 h-screen w-full">
                        <div className="bubble" style={{ width: '300px', height: '300px', left: '10%', '--duration': '15s' }}></div>
                        <div className="bubble" style={{ width: '200px', height: '200px', left: '60%', '--duration': '12s', animationDelay: '2s' }}></div>
                        <div className="bubble" style={{ width: '150px', height: '150px', left: '30%', '--duration': '18s', animationDelay: '5s' }}></div>
                    </div>

                    {/* Banner Superior */}
                    <div className="fixed top-0 w-full h-10 bg-[#0f172a] z-[60] flex items-center justify-between px-8 overflow-hidden">
                        <span className="text-[9px] md:text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] whitespace-nowrap">
                             SUSTENTABILIDAD CORPORATIVA & ESG
                        </span>
                        <div className="flex items-center space-x-4 opacity-60 flex-shrink-0">
                            <span className="text-[9px] font-bold text-white tracking-widest uppercase">AGENDA 2030</span>
                        </div>
                    </div>

                    {/* Navegación Principal */}
                    <nav className="fixed left-0 w-full z-50 px-6 md:px-8 py-4 flex justify-between items-center glass shadow-sm top-[40px]">
                        <a href="https://themeyer.eu" className="block z-50">
                            <img src="https://raw.githubusercontent.com/cypher-the-meyer/themeyer.eu/main/themeyerlogo" alt="The Meyer Logo" className="h-10 md:h-12 w-auto object-contain" />
                        </a>
                        
                        {/* Desktop Menu - Restaurado Hardware, Software, About us */}
                        <div className="hidden md:flex space-x-8 text-sm font-semibold tracking-widest uppercase opacity-60">
                            <a href="/pages/hardware" className="hover:text-blue-600 transition-colors">Hardware</a>
                            <a href="/pages/software" className="hover:text-blue-600 transition-colors">Software</a>
                            <a href="/pages/about" className="hover:text-blue-600 transition-colors">About us</a>
                        </div>

                        <div className="flex items-center space-x-4">
                            <button 
                                onClick={() => document.getElementById('contact-section').scrollIntoView({ behavior: 'smooth' })} 
                                className="hidden sm:block bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full text-sm font-bold transition-all shadow-md"
                            >
                                CONTACTO
                            </button>
                            
                            <button onClick={toggleMenu} className={`md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 focus:outline-none z-[110] ${isMobileMenuOpen ? 'menu-open' : ''}`}>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-transform duration-300" id="line1"></span>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-opacity duration-300" id="line2"></span>
                                <span className="block w-6 h-0.5 bg-gray-900 transition-transform duration-300" id="line3"></span>
                            </button>
                        </div>
                    </nav>
                        
                    {/* Menú Móvil Overlay */}
                    <div className={`fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] md:hidden flex flex-col items-center justify-center space-y-8 transition-all duration-500 ease-in-out ${isMobileMenuOpen ? 'opacity-100 translate-x-0' : 'opacity-0 translate-x-full pointer-events-none'}`}>
                        <a href="/pages/hardware" className="text-2xl font-bold uppercase hover:text-blue-600" onClick={toggleMenu}>Hardware</a>
                        <a href="/pages/software" className="text-2xl font-bold uppercase hover:text-blue-600" onClick={toggleMenu}>Software</a>
                        <a href="/pages/about" className="text-2xl font-bold uppercase hover:text-blue-600" onClick={toggleMenu}>About us</a>
                        <button 
                            onClick={() => { toggleMenu(); document.getElementById('contact-section')?.scrollIntoView({ behavior: 'smooth' }); }} 
                            className="bg-blue-600 text-white px-10 py-4 rounded-full text-lg font-bold shadow-xl mt-4"
                        >
                            CONTACTO
                        </button>
                    </div>

                    <main className="pt-32 relative z-10">
                        {children}
                    </main>

                    {/* Footer Legal */}
                    <footer className="py-12 border-t border-gray-200 text-center bg-white relative z-20 px-4">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex flex-wrap justify-center gap-x-6 gap-y-2 mb-4 text-[10px] md:text-xs font-semibold tracking-widest text-gray-400 uppercase">
                                <a href="/pages/terminos-y-condiciones" className="hover:text-blue-600 transition-colors">TERMINOS Y CONDICIONES</a>
                                <a href="/pages/privacidad" className="hover:text-blue-600 transition-colors">PRIVACIDAD</a>
                                <a href="/pages/terminos-de-servicio" className="hover:text-blue-600 transition-colors">TERMINOS DE SERVICIO</a>
                                <a href="/pages/cumplimiento-gdpr" className="hover:text-blue-600 transition-colors">CUMPLIMIENTO GDPR</a>
                                <a href="/pages/politicas-de-seguridad" className="hover:text-blue-600 transition-colors">POLITICAS DE SEGURIDAD</a>
                            </div>
                            <p className="text-gray-400 text-sm font-semibold tracking-widest uppercase">
                                &copy; 2026 THE MEYER EU. TODOS LOS DERECHOS RESERVADOS.
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const App = () => {
            return (
                <Layout>
                    <section className="max-w-7xl mx-auto px-6 md:px-8 py-20">
                        <div className="grid md:grid-cols-2 gap-16 items-center">
                            <div>
                                <h1 className="text-5xl md:text-6xl font-extrabold text-slate-900 leading-[1.1] mb-8">
                                    Talento Nearshore con <span className="text-blue-600">ADN de Seguridad.</span>
                                </h1>
                                <p className="text-slate-500 text-xl leading-relaxed mb-10">
                                    Evaluamos, perfilamos y seleccionamos desarrolladores freelance de alto nivel para integrarse a su equipo bajo el estándar Zero Trust.
                                </p>
                                <div className="flex flex-wrap gap-4">
                                    <div className="flex items-center gap-2 bg-blue-50 text-blue-700 px-4 py-2 rounded-lg text-sm font-bold border border-blue-100">
                                        <i className="fas fa-user-shield"></i> IAM ENFORCED
                                    </div>
                                    <div className="flex items-center gap-2 bg-slate-50 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold border border-slate-100">
                                        <i className="fas fa-microchip"></i> CLOUD NATIVE
                                    </div>
                                </div>
                            </div>
                            
                            <div className="bg-white border border-slate-100 shadow-2xl rounded-3xl p-10 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -mr-16 -mt-16 z-0"></div>
                                <div className="relative z-10">
                                    <div className="flex justify-between items-center mb-10">
                                        <h3 className="text-xl font-extrabold uppercase tracking-widest text-slate-400">Vetting Score</h3>
                                        <div className="h-2 w-12 bg-blue-600 rounded-full"></div>
                                    </div>
                                    <div className="space-y-8">
                                        {[
                                            { label: 'Seguridad IAM & OWASP', value: '98%' },
                                            { label: 'Arquitectura Microservicios', value: '94%' },
                                            { label: 'Cultura Corporativa & ESG', value: '92%' }
                                        ].map((item, idx) => (
                                            <div key={idx}>
                                                <div className="flex justify-between mb-2">
                                                    <span className="font-bold text-slate-700">{item.label}</span>
                                                    <span className="text-blue-600 font-extrabold">{item.value}</span>
                                                </div>
                                                <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                                    <div className="bg-blue-600 h-full rounded-full" style={{ width: item.value }}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="contact-section" className="py-24 text-center">
                        <div className="max-w-xl mx-auto px-6">
                            <h2 className="text-3xl font-extrabold mb-6">¿Listo para escalar su equipo?</h2>
                            <p className="text-slate-500 mb-10">Agende una llamada técnica para conocer cómo perfilamos el talento para su industria específica.</p>
                            <button className="bg-blue-600 text-white px-12 py-4 rounded-full font-bold hover:bg-blue-700 transition-all shadow-xl shadow-blue-100">
                                HABLAR CON UN EXPERTO
                            </button>
                        </div>
                    </section>
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
