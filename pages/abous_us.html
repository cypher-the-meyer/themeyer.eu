<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Meyer - About Us (Secured)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #1a202c;
            overflow-x: hidden;
        }

        .bubble-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 0;
        }
        .bubble {
            position: absolute;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 50%;
            bottom: -100px;
            animation: rise var(--duration) infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-110%) scale(1.2); opacity: 0; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-menu { transform: translateX(100%); pointer-events: none; }
        
        .menu-open #line1 { transform: rotate(45deg) translate(5px, 5px); }
        .menu-open #line2 { opacity: 0; }
        .menu-open #line3 { transform: rotate(-45deg) translate(5px, -5px); }

        .form-input { transition: all 0.3s ease; }
        .form-input:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.15);
        }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Layout = ({ children }) => {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const toggleMenu = () => setIsMobileMenuOpen(!isMobileMenuOpen);

            return (
                <div className="relative min-h-screen">
                    <div className="bubble-bg fixed inset-0 h-screen w-full">
                        <div className="bubble" style={{ width: '300px', height: '300px', left: '10%', '--duration': '15s' }}></div>
                        <div className="bubble" style={{ width: '200px', height: '200px', left: '60%', '--duration': '12s', animationDelay: '2s' }}></div>
                        <div className="bubble" style={{ width: '150px', height: '150px', left: '30%', '--duration': '18s', animationDelay: '5s' }}></div>
                    </div>

                    <div className="fixed top-0 w-full h-10 bg-[#0f172a] z-[60] flex items-center justify-between px-8">
                        <span className="text-[9px] md:text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em]">
                             THE MEYER | ABOUT US
                        </span>
                    </div>

                    <nav className="fixed left-0 w-full z-50 px-6 md:px-8 py-4 flex justify-between items-center glass shadow-sm top-[40px]">
                        <a href="/" className="block z-50">
                            <img src="https://raw.githubusercontent.com/cypher-the-meyer/themeyer.eu/main/themeyerlogo" alt="Logo" className="h-10 md:h-12 w-auto object-contain" />
                        </a>
                        
                        <div className="hidden md:flex space-x-8 text-sm font-semibold tracking-widest uppercase text-gray-600">
                            <a href="/pages/hardware.html" className="hover:text-blue-600 transition-colors">Hardware</a>
                            <a href="/pages/software.html" className="hover:text-blue-600 transition-colors">Software</a>
                            <a href="/pages/about_us.html" className="text-blue-600 font-bold border-b-2 border-blue-600">About us</a>
                        </div>

                        <button onClick={toggleMenu} className={`md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 focus:outline-none z-[110] ${isMobileMenuOpen ? 'menu-open' : ''}`}>
                            <span className="block w-6 h-0.5 bg-gray-900 transition-transform duration-300" id="line1"></span>
                            <span className="block w-6 h-0.5 bg-gray-900 transition-opacity duration-300" id="line2"></span>
                            <span className="block w-6 h-0.5 bg-gray-900 transition-transform duration-300" id="line3"></span>
                        </button>
                    </nav>
                    
                    <div id="mobile-menu" className={`fixed inset-0 bg-white/95 backdrop-blur-xl z-[100] md:hidden flex flex-col items-center justify-center space-y-8 transition-all duration-300 ${isMobileMenuOpen ? 'opacity-100' : 'hidden-menu opacity-0'}`}>
                        <a href="/pages/hardware.html" className="text-xl font-bold uppercase hover:text-blue-600" onClick={toggleMenu}>Hardware</a>
                        <a href="/pages/software.html" className="text-xl font-bold uppercase hover:text-blue-600" onClick={toggleMenu}>Software</a>
                        <a href="/pages/about_us.html" className="text-xl font-bold uppercase text-blue-600" onClick={toggleMenu}>About us</a>
                        <button 
                            onClick={() => { toggleMenu(); window.location.href = '/pages/Nosotros.html'; }} 
                            className="bg-blue-600 text-white px-10 py-4 rounded-full text-lg font-bold shadow-xl"
                        >
                            CONTACTO
                        </button>
                    </div>

                    <main className="pt-32 px-4 md:px-8">
                        {children}
                    </main>
                </div>
            );
        };

        const SecureForm = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const handleOAuthLogin = () => {
                const redirectUri = window.location.origin + "/pages/about_us.html";
                console.log("Redirect URI set to:", redirectUri);
                setTimeout(() => setIsAuthenticated(true), 800);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!window.grecaptcha || !grecaptcha.getResponse()) {
                    alert("Por favor, completa el reCAPTCHA.");
                    return;
                }
                alert("Formulario enviado con éxito.");
            };

            if (!isAuthenticated) {
                return (
                    <div className="max-w-xl mx-auto my-12 p-8 glass rounded-2xl text-center shadow-lg border border-gray-200 relative z-20">
                        <h2 className="text-2xl font-bold mb-4 text-gray-800">Acceso Restringido</h2>
                        <p className="text-gray-500 mb-6">Protegido por OAuth2 PKCE.</p>
                        <button onClick={handleOAuthLogin} className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full text-sm font-bold transition-all w-full">
                            Autenticar para Continuar
                        </button>
                    </div>
                );
            }

            return (
                <div className="max-w-xl mx-auto my-12 p-8 glass rounded-2xl shadow-lg border border-gray-200 relative z-20">
                    <h2 className="text-2xl font-bold mb-6 text-gray-800">Formulario de Contacto Seguro</h2>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <input type="text" placeholder="Nombre Completo" required className="form-input w-full p-4 rounded-xl border border-gray-200 bg-white/50 focus:outline-none" />
                        <input type="email" placeholder="Correo Institucional" required className="form-input w-full p-4 rounded-xl border border-gray-200 bg-white/50 focus:outline-none" />
                        <textarea placeholder="Mensaje" required rows="4" className="form-input w-full p-4 rounded-xl border border-gray-200 bg-white/50 focus:outline-none resize-none"></textarea>
                        <div className="g-recaptcha my-4 flex justify-center" data-sitekey="YOUR_RECAPTCHA_SITE_KEY"></div>
                        <button type="submit" className="bg-[#0f172a] hover:bg-blue-600 text-white w-full py-4 rounded-xl font-bold tracking-wider transition-colors">
                            ENVIAR DATOS
                        </button>
                    </form>
                </div>
            );
        };

        const App = () => {
            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);
                gsap.from("#title-anim", { duration: 1, y: 30, opacity: 0, ease: "power3.out" });
                gsap.from(".text-paragraph", { duration: 1, y: 20, opacity: 0, delay: 0.3, stagger: 0.2, ease: "power3.out" });
                gsap.from("#full-width-image", {
                    scrollTrigger: { trigger: "#full-width-image", start: "top 90%" },
                    scale: 0.95, opacity: 0, duration: 1.5, ease: "power2.out"
                });
            }, []);

            return (
                <Layout>
                    <section className="relative pt-12 pb-8 px-4 text-center z-10">
                        <div className="max-w-4xl mx-auto">
                            <h1 className="text-4xl md:text-6xl font-extrabold text-gray-900 tracking-tight mb-8" id="title-anim">
                                Sobre <span className="text-blue-600">The Meyer</span>
                            </h1>
                            <p className="text-paragraph text-gray-500 font-medium text-lg md:text-xl leading-relaxed">
                                Somos una firma con dos principales divisiones, pioneras en la integración de tecnología y soluciones de vanguardia.
                            </p>
                        </div>
                    </section>

                    <section className="py-8 px-0 md:px-8 relative z-20 mb-10">
                        <div className="max-w-[1400px] mx-auto overflow-hidden rounded-[0] md:rounded-[3rem] shadow-2xl">
                            <div className="relative h-[400px] md:h-[500px] w-full" id="full-width-image">
                                <img 
                                    src="https://raw.githubusercontent.com/cypher-the-meyer/themeyer.eu/main/media/Meeting.jpg" 
                                    alt="Oficinas" 
                                    className="w-full h-full object-cover"
                                />
                            </div>
                        </div>
                    </section>

                    <SecureForm />

                    <footer className="py-12 mt-20 border-t border-gray-100 text-center text-gray-400 text-sm font-semibold tracking-widest bg-white relative z-20">
                        &copy; 2026 THE MEYER EU. <br className="md:hidden" /> Innovando para un mañana sustentable.
                    </footer>
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
