name = "geo-router-themeyer"
main = "src/index.html"  # Ensure this points to your main JS file
compatibility_date = "2026-03-28"

# Bindings to intercept your main domain traffic
[[routes]]
pattern = "themeyer.eu/*"
custom_domain = true

# Catch-all for subdomains to ensure the router logic always runs
[[routes]]
pattern = "*.themeyer.eu/*"
custom_domain = true

[observability]
enabled = true
